  // 1つのシリーズへの入口カード。group: { name, items } (itemsは巻数順)。
  function buildSeriesGroupCard(group) {
    const card = document.createElement('div');
    card.className = 'book-card folder-card';

    const cover = document.createElement('div');
    cover.className = 'book-cover folder-cover';
    const seriesGroupIcon = document.createElement('img');
    seriesGroupIcon.src = ICON_BOOKS;
    seriesGroupIcon.alt = 'シリーズ';
    cover.appendChild(seriesGroupIcon);

    const title = document.createElement('div');
    title.className = 'book-title';
    title.textContent = group.name;

    const sub = document.createElement('div');
    sub.className = 'book-series';
    sub.textContent = '全' + group.items.length + '巻';

    card.appendChild(cover);
    card.appendChild(title);
    card.appendChild(sub);
    card.addEventListener('click', () => {
      currentFolderView = SERIES_FOLDER_ID;
      currentSeriesView = group.name;
      reorderMode = false;
      renderSavedList();
    });
    return card;
  }

  // Swaps `item` with its neighbor (direction -1 = up/earlier, +1 =
  // down/later) within `list` (the same flat array currently rendered for
  // this view) by finding both items' real positions in the underlying
  // savedItems array and swapping just those two slots. This works
  // regardless of where the items actually sit in savedItems, since a
  // folder's display order is simply whatever order its items happen to
  // appear in within savedItems.
  function moveItemInList(item, list, direction) {
    const idx = list.indexOf(item);
    const swapIdx = idx + direction;
    if (idx === -1 || swapIdx < 0 || swapIdx >= list.length) return;
    const other = list[swapIdx];
    const realIdxA = savedItems.indexOf(item);
    const realIdxB = savedItems.indexOf(other);
    if (realIdxA === -1 || realIdxB === -1) return;
    savedItems[realIdxA] = other;
    savedItems[realIdxB] = item;
    persistAll();
    renderSavedList();
  }

  // item.url is undefined for "custom" (explicit page list) items, so
  // title/tooltip fallbacks need to handle that case too.
  function itemDisplayTitle(item) {
    return item.title || (item.url ? deriveTitleFromUrl(item.url) : '無題');
  }
  function itemSubtext(item) {
    if (item.url) return item.url;
    if (Array.isArray(item.pages)) return '個別URL ・ ' + item.pages.length + 'ページ';
    return '';
  }

  // Manga are shown as a Kindle-bookshelf-style grid of page-1 cover
  // thumbnails. Reuses the same cascading-extension cover lookup as the 一覧
  // feed view. Every item also gets an 編集 (edit) button alongside the
  // existing 削除 (delete) one — works for both normal and custom items.
  // reorderMode: when true, swaps the normal 編集/削除/お気に入り buttons for
  // 上下移動 (move up/down) buttons, and disables tap-to-open — so taps in
  // 並べ替え mode can't accidentally open a manga while the user is busy
  // rearranging the shelf.
  function buildBookCard(item, list, reorderMode) {
    const card = document.createElement('div');
    card.className = 'book-card' + (reorderMode ? ' reorder-card' : '');
    card.title = itemSubtext(item);

    const cover = document.createElement('div');
    cover.className = 'book-cover';
    const img = document.createElement('img');
    img.alt = itemDisplayTitle(item);
    if (Array.isArray(item.pages) && item.pages.length) {
      img.src = item.pages[0]; // exact URL already known; no extension cascade needed
    } else {
      setupFeedImage(img, item.url);
    }
    cover.appendChild(img);

    if (reorderMode) {
      const idx = list.indexOf(item);
      const upBtn = document.createElement('button');
      upBtn.className = 'book-moveBtn book-moveUpBtn';
      upBtn.textContent = '▲';
      upBtn.title = '上に移動';
      upBtn.disabled = idx <= 0;
      upBtn.addEventListener('click', (e) => { e.stopPropagation(); moveItemInList(item, list, -1); });
      cover.appendChild(upBtn);

      const downBtn = document.createElement('button');
      downBtn.className = 'book-moveBtn book-moveDownBtn';
      downBtn.textContent = '▼';
      downBtn.title = '下に移動';
      downBtn.disabled = idx >= list.length - 1;
      downBtn.addEventListener('click', (e) => { e.stopPropagation(); moveItemInList(item, list, 1); });
      cover.appendChild(downBtn);
    } else {
      const editBtn = document.createElement('button');
      editBtn.className = 'book-editBtn';
      editBtn.textContent = '✎';
      editBtn.title = '編集';
      editBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openEditItemDialog(item);
      });
      cover.appendChild(editBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'book-delBtn';
      delBtn.textContent = '×';
      delBtn.title = '削除';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('「' + itemDisplayTitle(item) + '」を削除します。本当によろしいですか？')) return;
        savedItems = savedItems.filter((it) => it.id !== item.id);
        persistAll();
        updateCurrentTitleDisplay();
        renderSavedList();
      });
      cover.appendChild(delBtn);

      const favBtn = document.createElement('button');
      favBtn.className = 'book-favBtn';
      favBtn.appendChild(makeHeartIcon(!!item.favorite));
      favBtn.title = item.favorite ? 'お気に入りから外す' : 'お気に入りに追加';
      favBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        item.favorite = !item.favorite;
        persistAll();
        renderSavedList();
      });
      cover.appendChild(favBtn);
    }

    const title = document.createElement('div');
    title.className = 'book-title';
    title.textContent = itemDisplayTitle(item);

    card.appendChild(cover);
    card.appendChild(title);
    if (item.series) {
      const seriesEl = document.createElement('div');
      seriesEl.className = 'book-series';
      seriesEl.textContent = item.series + ' 第' + item.volume + '巻';
      card.appendChild(seriesEl);
    }
    if (!reorderMode) {
      card.addEventListener('click', () => {
        closeSavedList();
        setReadingListContext(list, list.indexOf(item));
        openItem(item, false);
      });
    }
    return card;
  }

  function renderSavedList() {
    const inSeriesGroup = currentFolderView === SERIES_FOLDER_ID && !!currentSeriesView;
    const inSeriesRoot = currentFolderView === SERIES_FOLDER_ID && !currentSeriesView;

    els.listBackBtn.style.display = currentFolderView ? '' : 'none';
    els.listNewFolderBtn.style.display = currentFolderView ? 'none' : '';
    els.listNewFolderRow.style.display = 'none';

    if (currentFolderView === FAVORITES_FOLDER_ID) {
      els.listFolderTitle.textContent = FAVORITES_FOLDER_NAME;
    } else if (inSeriesGroup) {
      els.listFolderTitle.textContent = currentSeriesView;
    } else if (inSeriesRoot) {
      els.listFolderTitle.textContent = SERIES_FOLDER_NAME;
    } else if (currentFolderView) {
      const folder = savedFolders.find((f) => f.id === currentFolderView);
      els.listFolderTitle.textContent = folder ? folder.name : '';
    } else {
      els.listFolderTitle.textContent = '';
    }

    els.savedListItems.innerHTML = '';
    els.savedListItems.classList.add('bookshelf'); // bookshelf grid at every level now

    let itemsList = []; // flat item list for the current view; doubles as swipe context
    let folderCards = [];
    let seriesGroupCards = []; // [{name, items}], only populated at the シリーズ root (list of series names)
    let showFavoritesCard = false;
    let showSeriesCard = false;

    if (!currentFolderView) {
      itemsList = savedItems.filter((it) => !it.folderId);
      folderCards = savedFolders;
      showFavoritesCard = true;
      showSeriesCard = true;
    } else if (currentFolderView === FAVORITES_FOLDER_ID) {
      // Virtual view: aggregates favorited items regardless of which real
      // folder they actually live in, instead of filtering by folderId.
      itemsList = savedItems.filter((it) => it.favorite);
    } else if (inSeriesRoot) {
      // Virtual view: groups every series-tagged item by series name
      // regardless of which real folder it lives in. Each group's items are
      // pre-sorted by volume so drilling in shows volume 1, 2, 3... in order.
      const groups = new Map();
      savedItems.forEach((it) => {
        if (!it.series) return;
        if (!groups.has(it.series)) groups.set(it.series, []);
        groups.get(it.series).push(it);
      });
      seriesGroupCards = Array.from(groups.entries())
        .map(([name, items]) => ({ name, items: items.slice().sort((a, b) => (a.volume || 0) - (b.volume || 0)) }))
        .sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    } else if (inSeriesGroup) {
      itemsList = savedItems.filter((it) => it.series === currentSeriesView)
        .sort((a, b) => (a.volume || 0) - (b.volume || 0));
    } else {
      itemsList = savedItems.filter((it) => it.folderId === currentFolderView);
    }

    // "一覧" (feed) only makes sense inside a view that has browsable items —
    // not at the シリーズ root, which is just a list of series names to drill into.
    els.feedBtn.style.display = (currentFolderView && itemsList.length && !inSeriesRoot) ? '' : 'none';

    // 並べ替え (manual reorder) only makes sense inside a real folder: a
    // series' volume list is ordered by volume number, not manually, and
    // 履歴/お気に入り auto-manage their own order, so all of those are excluded.
    const reorderable = !!currentFolderView && currentFolderView !== FAVORITES_FOLDER_ID &&
      currentFolderView !== HISTORY_FOLDER_ID && !inSeriesRoot && !inSeriesGroup && itemsList.length > 1;
    els.reorderBtn.style.display = reorderable ? '' : 'none';
    const showReorderControls = reorderable && reorderMode;
    els.reorderBtn.classList.toggle('active', showReorderControls);
    els.reorderBtn.textContent = showReorderControls ? '並べ替え完了' : '並べ替え';

    const isEmpty = folderCards.length === 0 && itemsList.length === 0 && seriesGroupCards.length === 0 &&
      !showFavoritesCard && !showSeriesCard;
    if (isEmpty) {
      els.savedListEmpty.style.display = 'block';
      els.savedListEmpty.textContent = currentFolderView === FAVORITES_FOLDER_ID
        ? 'お気に入りはまだ追加されていません'
        : inSeriesRoot
          ? 'シリーズはまだ設定されていません'
          : (currentFolderView ? 'このフォルダにはまだ何もありません' : '保存されたURLはまだありません');
    } else {
      els.savedListEmpty.style.display = 'none';
      if (showFavoritesCard) els.savedListItems.appendChild(buildFavoritesFolderCard());
      if (showSeriesCard) els.savedListItems.appendChild(buildSeriesFolderCard());
      folderCards.forEach((f) => els.savedListItems.appendChild(buildFolderCard(f)));
      seriesGroupCards.forEach((g) => els.savedListItems.appendChild(buildSeriesGroupCard(g)));
      itemsList.forEach((it) => els.savedListItems.appendChild(buildBookCard(it, itemsList, showReorderControls)));
    }
  }

  // hideCloseBtn: true when this list is being shown automatically because
  // nothing else is open (no manga behind it to return to) — in that case
  // the 閉じる button is hidden, since there's nothing useful to "go back to"
  // by closing the list. Manual opens (リストボタン) always pass false/omit
  // it, so 閉じる shows normally.
  function openSavedList(hideCloseBtn) {
    currentFolderView = null;
    currentSeriesView = null;
    reorderMode = false;
    renderSavedList();
    els.savedListOverlay.classList.add('show');
    els.closeListBtn.style.display = hideCloseBtn ? 'none' : '';
  }
  function closeSavedList() { els.savedListOverlay.classList.remove('show'); }
  function isSavedListOpen() { return els.savedListOverlay.classList.contains('show'); }

  // A saved item only stores the manga's base URL, not which file extension
  // its pages use, so the cover image is found the same cascading way page
  // detection works: try .jpg, then .jpeg/.png/.webp on error, in order.
  // Used by the bookshelf grid (buildBookCard) for cover thumbnails.
  function setupFeedImage(imgEl, baseUrlForItem) {
    let idx = 0;
    function tryNext() {
      if (idx >= EXT_CANDIDATES.length) return;
      imgEl.src = baseUrlForItem + '1.' + EXT_CANDIDATES[idx];
      idx++;
    }
    imgEl.addEventListener('error', tryNext);
    tryNext();
  }

  function anyModalOpen() { return isSaveDialogOpen() || isSavedListOpen() || isCustomAddDialogOpen() || isEditItemDialogOpen() || isTocListOpen() || isGithubSyncOpen(); }

  // ---------- events ----------
  function handleNewManga() {
    const input = window.prompt('URLを入力してください\n例: https://example.com/manga/test/  または .../1.jpg');
    if (input === null) return; // cancelled
    const v = input.trim();
    if (!v) return;
    clearReadingListContext();
    currentItem = null; // raw URL open, not tied to a saved item
    startReading(v, true);
  }
  els.newBtn.addEventListener('click', handleNewManga);
  els.closeBtn.addEventListener('click', closeManga);

  // リーダー上部のお気に入りトグル。currentItem (またはbaseUrl一致の履歴等の
  // アイテム) のfavoriteを直接書き換えて即時保存・表示更新する。
  els.favToggleBtn.addEventListener('click', () => {
    const item = getCurrentItem();
    if (!item) return;
    item.favorite = !item.favorite;
    persistAll();
    updateFavToggleButton();
  });

  els.saveBtn.addEventListener('click', openSaveDialog);
  els.cancelSaveBtn.addEventListener('click', closeSaveDialog);
  els.confirmSaveBtn.addEventListener('click', confirmSave);
  els.saveDialogOverlay.addEventListener('click', (e) => { if (e.target === els.saveDialogOverlay) closeSaveDialog(); });
  els.saveFolderSelect.addEventListener('change', () => {
    if (els.saveFolderSelect.value === '__new__') {
      els.newFolderRow.style.display = 'flex';
      els.newFolderInput.focus();
    } else {
      els.newFolderRow.style.display = 'none';
    }
  });
  els.confirmNewFolderBtn.addEventListener('click', () => {
    const name = els.newFolderInput.value.trim();
    if (!name) return;
    const folder = { id: genId('f'), name: name };
    savedFolders.push(folder);
    persistAll();
    renderFolderOptions(els.saveFolderSelect, folder.id);
    els.newFolderRow.style.display = 'none';
  });

  els.exportBtn.addEventListener('click', exportData);
  els.importBtn.addEventListener('click', () => els.importFileInput.click());
  els.importFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importDataFromFile(file);
    els.importFileInput.value = '';
  });

  els.addCustomBtn.addEventListener('click', openCustomAddDialog);
  els.openGithubSyncBtn.addEventListener('click', openGithubSyncDialog);
  els.closeGithubSyncBtn.addEventListener('click', closeGithubSyncDialog);
  els.githubSyncOverlay.addEventListener('click', (e) => { if (e.target === els.githubSyncOverlay) closeGithubSyncDialog(); });
  els.githubSyncForm.addEventListener('submit', (e) => {
    // 実際のページ送信はしない。ただし preventDefault の前に submit イベントが
    // 発火することで、SafariなどのブラウザのKeychain保存候補に「ユーザー名
    // (=リポジトリ)」「パスワード(=トークン)」として認識させ、保存ダイアログを
    // 出させるための実フォーム送信として扱う。
    e.preventDefault();
    saveGithubSyncSettingsFromForm();
  });
  els.githubPushBtn.addEventListener('click', githubPush);
  els.githubPullBtn.addEventListener('click', githubPull);
  els.cancelCustomAddBtn.addEventListener('click', closeCustomAddDialog);
  els.confirmCustomAddBtn.addEventListener('click', confirmCustomAdd);
  els.customAddOverlay.addEventListener('click', (e) => { if (e.target === els.customAddOverlay) closeCustomAddDialog(); });
  els.customFolderSelect.addEventListener('change', () => {
    if (els.customFolderSelect.value === '__new__') {
      els.customNewFolderRow.style.display = 'flex';
      els.customNewFolderInput.focus();
    } else {
      els.customNewFolderRow.style.display = 'none';
    }
  });
  els.customConfirmNewFolderBtn.addEventListener('click', () => {
    const name = els.customNewFolderInput.value.trim();
    if (!name) return;
    const folder = { id: genId('f'), name: name };
    savedFolders.push(folder);
    persistAll();
    renderFolderOptions(els.customFolderSelect, folder.id);
    els.customNewFolderRow.style.display = 'none';
  });

  els.cancelEditItemBtn.addEventListener('click', closeEditItemDialog);
  els.confirmEditItemBtn.addEventListener('click', confirmEditItem);
  els.editItemOverlay.addEventListener('click', (e) => { if (e.target === els.editItemOverlay) closeEditItemDialog(); });
  els.editFolderSelect.addEventListener('change', () => {
    if (els.editFolderSelect.value === '__new__') {
      els.editNewFolderRow.style.display = 'flex';
      els.editNewFolderInput.focus();
    } else {
      els.editNewFolderRow.style.display = 'none';
    }
  });
  els.editConfirmNewFolderBtn.addEventListener('click', () => {
    const name = els.editNewFolderInput.value.trim();
    if (!name) return;
    const folder = { id: genId('f'), name: name };
    savedFolders.push(folder);
    persistAll();
    renderFolderOptions(els.editFolderSelect, folder.id);
    els.editNewFolderRow.style.display = 'none';
  });

  els.listBtn.addEventListener('click', () => openSavedList(false));
  els.closeListBtn.addEventListener('click', closeSavedList);
  els.savedListOverlay.addEventListener('click', (e) => { if (e.target === els.savedListOverlay) closeSavedList(); });
  els.listBackBtn.addEventListener('click', () => {
    // From inside a specific シリーズ, 戻る goes back to the series-name list
    // first (not straight to the top root) — a two-level back, matching the
    // two-level drill-in.
    if (currentFolderView === SERIES_FOLDER_ID && currentSeriesView) {
      currentSeriesView = null;
    } else {
      currentFolderView = null;
      currentSeriesView = null;
    }
    reorderMode = false;
    renderSavedList();
  });
  els.listNewFolderBtn.addEventListener('click', () => {
    const showing = els.listNewFolderRow.style.display === 'flex';
    els.listNewFolderRow.style.display = showing ? 'none' : 'flex';
    if (!showing) els.listNewFolderInput.focus();
  });
  els.listNewFolderConfirmBtn.addEventListener('click', () => {
    const name = els.listNewFolderInput.value.trim();
    if (!name) return;
    savedFolders.push({ id: genId('f'), name: name });
    persistAll();
    els.listNewFolderInput.value = '';
    els.listNewFolderRow.style.display = 'none';
    renderSavedList();
  });

  // "一覧": jump straight into the reader for the folder's first manga (no
  // intermediate browsing screen), with swipe context set to the whole
  // folder so the reader's vertical swipe can step through the rest.
  els.feedBtn.addEventListener('click', () => {
    if (!currentFolderView) return;
    let items;
    if (currentFolderView === FAVORITES_FOLDER_ID) {
      items = savedItems.filter((it) => it.favorite);
    } else if (currentFolderView === SERIES_FOLDER_ID) {
      if (!currentSeriesView) return; // browsing series names; nothing to feed yet
      items = savedItems.filter((it) => it.series === currentSeriesView).sort((a, b) => (a.volume || 0) - (b.volume || 0));
    } else {
      items = savedItems.filter((it) => it.folderId === currentFolderView);
    }
    if (!items.length) return;
    closeSavedList();
    setReadingListContext(items, 0);
    openItem(items[0], false);
  });

  els.reorderBtn.addEventListener('click', () => {
    reorderMode = !reorderMode;
    renderSavedList();
  });

  els.zoneLeft.addEventListener('click', prevPage);
  els.zoneRight.addEventListener('click', nextPage);
  els.zoneMid.addEventListener('click', toggleBars);
  els.firstBtn.addEventListener('click', goFirst);
  els.lastBtn.addEventListener('click', goLast);
  els.nextBtn.addEventListener('click', nextPage);
  els.prevBtn.addEventListener('click', prevPage);
  els.animBtn.addEventListener('click', toggleAnim);
  els.pageSlider.addEventListener('input', (e) => showPage(parseInt(e.target.value, 10) || 1));

  els.tocAddBtn.addEventListener('click', addTocEntry);
  els.tocBtn.addEventListener('click', openTocList);
  els.closeTocBtn.addEventListener('click', closeTocList);
  els.tocOverlay.addEventListener('click', (e) => { if (e.target === els.tocOverlay) closeTocList(); });

  els.nextVolumeBtn.addEventListener('click', () => {
    if (!pendingNextVolumeItem) return;
    const item = pendingNextVolumeItem;
    hideNextVolumeBanner();
    clearReadingListContext(); // next volume isn't necessarily part of the current folder/feed swipe order
    openItem(item, false);
  });
  els.nextVolumeDismissBtn.addEventListener('click', () => {
    nextVolumeDismissed = true;
    hideNextVolumeBanner();
  });

  document.addEventListener('keydown', (e) => {
    if (e.target === els.saveTitleInput ||
        e.target === els.newFolderInput || e.target === els.listNewFolderInput ||
        e.target === els.customTitleInput || e.target === els.customNewFolderInput ||
        e.target === els.customPagesTextarea ||
        e.target === els.editTitleInput || e.target === els.editNewFolderInput ||
        e.target === els.editUrlInput || e.target === els.editPagesTextarea ||
        e.target === els.githubRepoInput || e.target === els.githubPathInput || e.target === els.githubTokenInput) {
      if (e.key === 'Escape') { closeSaveDialog(); closeSavedList(); closeCustomAddDialog(); closeEditItemDialog(); closeTocList(); closeGithubSyncDialog(); }
      return;
    }
    if (anyModalOpen()) {
      if (e.key === 'Escape') { closeSaveDialog(); closeSavedList(); closeCustomAddDialog(); closeEditItemDialog(); closeTocList(); closeGithubSyncDialog(); }
      return;
    }
    switch (e.key) {
      case 'ArrowLeft': prevPage(); break;   // left = back
      case 'ArrowRight': nextPage(); break;  // right = forward
      case 'Home': goFirst(); break;
      case 'End': goLast(); break;
      case 'h': case 'H': toggleBars(); break;
    }
  });

  // ---------- access lock (always required, not remembered between visits) ----------
  const LOCK_CODE = '8122';

  function checkLock() {
    els.lockOverlay.style.display = 'flex';
    els.lockInput.focus();
  }

  function tryUnlock() {
    if (els.lockInput.value.trim() === LOCK_CODE) {
      els.lockOverlay.style.display = 'none';
      els.lockError.textContent = '';
    } else {
      els.lockError.textContent = 'コードが違います';
      els.lockInput.value = '';
      els.lockInput.focus();
    }
  }

  els.lockSubmitBtn.addEventListener('click', tryUnlock);
  els.lockInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  checkLock();

  // No URL bar anymore, so automatically resume the last-viewed manga on
  // load (not counted as a "新規" open, so it isn't re-added to 履歴).
  // LAST_URL_KEY is now a JSON envelope ({kind:'url',value} or
  // {kind:'item',itemId}) so a custom (explicit page list) manga can be
  // resumed too; older saved data was a plain URL string, handled below.
  let resumedOnLoad = false;
  try {
    const raw = localStorage.getItem(LAST_URL_KEY);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.kind === 'url' && parsed.value) {
          startReading(parsed.value, false);
          resumedOnLoad = true;
        } else if (parsed && parsed.kind === 'item' && parsed.itemId) {
          const it = savedItems.find((x) => x.id === parsed.itemId);
          if (it) { openItem(it, false); resumedOnLoad = true; }
        }
      } catch (e) { /* not JSON: legacy plain-string URL from before this change */ }
      if (!resumedOnLoad && /^https?:\/\//i.test(raw)) { startReading(raw, false); resumedOnLoad = true; }
    }
  } catch (e) {}
  // 何も復元されなかった場合（初回起動、または閉じる操作の直後など）は、
  // 空のplaceholderの代わりにリスト（保存したURL）を表示する。
  if (!resumedOnLoad) openSavedList(true);
})();
</script>
</body>
</html>
