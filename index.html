  // numbering) changes.
  const resolvedListPageUrl = new Map();
  const resolvingListIndex = new Set(); // indices with a preloadFirstPage() call currently in flight
  function setReadingListContext(items, index) {
    readingListItems = items;
    readingListIndex = index;
    readingListGeneration++;
    resolvedListPageUrl.clear();
    resolvingListIndex.clear();
    preloadAdjacentManga();
  }
  // Preloads page 1 of the manga just above/below the current position in
  // readingListItems, so swiping up/down shows it instantly instead of
  // waiting for a network fetch. Cheap to call repeatedly; indices already
  // resolved or currently resolving are skipped.
  function preloadAdjacentManga() {
    const myListGen = readingListGeneration;
    [readingListIndex - 1, readingListIndex + 1].forEach((idx) => {
      if (idx < 0 || idx >= readingListItems.length) return;
      if (resolvedListPageUrl.has(idx) || resolvingListIndex.has(idx)) return;
      const item = readingListItems[idx];
      if (!item) return;
      const isCustom = Array.isArray(item.pages) && item.pages.length;
      const firstPageUrl = isCustom ? item.pages[0] : item.url;
      if (!firstPageUrl) return;
      if (isCustom) {
        resolvedListPageUrl.set(idx, firstPageUrl); // exact URL already known
        if (preloadedCoverUrls.has(firstPageUrl)) return;
        preloadedCoverUrls.add(firstPageUrl);
        const img = new Image(); // no extension cascade needed
        img.src = firstPageUrl;
      } else {
        resolvingListIndex.add(idx);
        preloadFirstPage(firstPageUrl).then((resolvedUrl) => {
          resolvingListIndex.delete(idx);
          if (myListGen !== readingListGeneration) return; // a different list is active now; discard
          if (resolvedUrl) resolvedListPageUrl.set(idx, resolvedUrl);
        });
      }
    });
  }
  // Looks up the already-resolved first-page URL of the manga `offset`
  // positions away from the one currently open (e.g. offset=1 is "next").
  // Returns null if out of range or not resolved yet (still detecting) —
  // callers treat that as "no live neighbor available for this gesture".
  function neighborListUrlForOffset(offset) {
    const idx = readingListIndex + offset;
    if (idx < 0 || idx >= readingListItems.length) return null;
    return resolvedListPageUrl.get(idx) || null;
  }
  function clearReadingListContext() {
    readingListItems = [];
    readingListIndex = -1;
    readingListGeneration++;
    resolvedListPageUrl.clear();
    resolvingListIndex.clear();
  }

  let fitModes = ['fit-contain', 'fit-width', 'fit-height'];
  let fitLabels = { 'fit-contain': '表示:全体', 'fit-width': '表示:幅優先', 'fit-height': '表示:高さ優先' };
  let fitIndex = 0;

  let animEnabled = true;

  let savedFolders = []; // [{id, name}]
  // [{id, url, title, folderId, addedAt}] for normal 連番ベースURL manga, or
  // [{id, pages: [url, url, ...], title, folderId, addedAt}] (no `url`) for
  // a "custom" manga added via 個別追加 — see
  // confirmCustomAdd / openItem / startReadingCustom.
  let savedItems = [];
  let currentFolderView = null;
  let currentSeriesView = null; // series name when drilled into a シリーズ group; null while browsing series names or anywhere else
  let reorderMode = false; // true while 並べ替え (manual up/down reorder) controls are shown for the current folder view
  let pendingSaveUrl = null;
  // Whether opening the 個別追加/編集 dialog hid an already-open 保存したURL
  // list popup behind it; if so, closing the dialog reopens (and re-renders)
  // the list instead of leaving it closed.
  let customAddReturnToList = false;
  let editReturnToList = false;
  let githubSyncReturnToList = false;
  let editingItemId = null; // id of the saved item currently open in the 編集 dialog

  function genId(prefix) {
    return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ---------- persistence ----------
  try {
    const a = localStorage.getItem(ANIM_KEY);
    if (a !== null) animEnabled = a === '1';
  } catch (e) {}
  els.animBtn.classList.toggle('active', animEnabled);

  function persistAnim() { try { localStorage.setItem(ANIM_KEY, animEnabled ? '1' : '0'); } catch (e) {} }
  function persistFolders() { try { localStorage.setItem(SAVED_FOLDERS_KEY, JSON.stringify(savedFolders)); } catch (e) {} }
  function persistItems() { try { localStorage.setItem(SAVED_ITEMS_KEY, JSON.stringify(savedItems)); } catch (e) {} }
  function persistAll() {
    persistFolders();
    persistItems();
  }

  // Remembers the last page viewed per manga (keyed by baseUrl). If the last
  // viewed page was the final page (and detection had finished, so we know it
  // really was the end), resuming should restart from page 1 instead.
  function persistLastPage() {
    if (!currentResumeKey || !pages.length) return;
    try {
      const map = JSON.parse(localStorage.getItem(LAST_PAGE_KEY) || '{}');
      map[currentResumeKey] = {
        page: currentPage,
        wasLast: detectionDone && currentPage === pages.length,
        savedAt: Date.now(),
      };
      localStorage.setItem(LAST_PAGE_KEY, JSON.stringify(map));
    } catch (e) {}
  }

  function getResumePage(url) {
    try {
      const map = JSON.parse(localStorage.getItem(LAST_PAGE_KEY) || '{}');
      const rec = map[url];
      if (rec && !rec.wasLast && rec.page > 1) return rec.page;
    } catch (e) {}
    return null;
  }

  // ---------- table of contents (目次) ----------
  // Chapter markers are stored per-manga, keyed the same way as the resume
  // page (currentResumeKey: baseUrl for normal manga, 'custom:<id>' for a
  // 個別追加 manga), so each manga keeps its own independent 目次.
  function loadTocMap() {
    try { return JSON.parse(localStorage.getItem(TOC_KEY) || '{}'); } catch (e) { return {}; }
  }
  function persistTocMap(map) {
    try { localStorage.setItem(TOC_KEY, JSON.stringify(map)); } catch (e) {}
  }
  function loadCurrentToc() {
    const map = loadTocMap();
    currentToc = (map[currentResumeKey] || []).slice().sort((a, b) => a.page - b.page);
    updateTocButtonVisibility();
  }
  function saveCurrentToc() {
    const map = loadTocMap();
    if (currentToc.length) map[currentResumeKey] = currentToc;
    else delete map[currentResumeKey];
    persistTocMap(map);
    updateTocButtonVisibility();
  }
  function updateTocButtonVisibility() {
    els.tocBtn.style.display = currentToc.length ? '' : 'none';
  }

  function addTocEntry() {
    if (!pages.length) { flashStatus('表示中の作品がありません'); return; }
    const existing = currentToc.find((t) => t.page === currentPage);
    const defaultName = existing ? existing.name : ('第' + (currentToc.length + 1) + '章');
    const name = window.prompt('目次名を入力してください（' + currentPage + 'ページ目をここで区切ります）', defaultName);
    if (name === null) return; // cancelled
    const trimmed = name.trim() || defaultName;
    currentToc = currentToc.filter((t) => t.page !== currentPage);
    currentToc.push({ page: currentPage, name: trimmed });
    currentToc.sort((a, b) => a.page - b.page);
    saveCurrentToc();
    flashStatus('目次に追加しました');
  }

  // Cuts out the page range from toc entry `t` (inclusive) up to (but not
  // including) the next toc entry's page — or to the manga's last page if
  // `t` is the last entry — and saves that slice as its own independent
  // "custom" (explicit page-list) item in the saved list, so a long manga
  // split into 目次 chapters can be pulled out chapter-by-chapter into its
  // own bookshelf entry.
  function saveTocRangeAsBook(t, idx) {
    if (!pages.length) { flashStatus('表示中の作品がありません'); return; }
    const nextEntry = currentToc[idx + 1];
    const endPage = nextEntry ? nextEntry.page - 1 : pages.length;
    if (endPage < t.page) { flashStatus('ページ範囲が不正です'); return; }
    const pageUrls = pages.slice(t.page - 1, endPage);
    const title = window.prompt('切り出して保存する本のタイトルを入力してください（' + t.page + '〜' + endPage + 'ページ）', t.name);
    if (title === null) return; // cancelled
    const trimmed = title.trim() || t.name;
    savedItems.unshift({
      id: genId('i'),
      title: trimmed,
      folderId: null,
      pages: pageUrls,
      addedAt: Date.now(),
    });
    persistAll();
    flashStatus(pageUrls.length + 'ページを「' + trimmed + '」として保存しました');
  }

  function renderTocList() {
    els.tocListItems.innerHTML = '';
    if (!currentToc.length) {
      els.tocListEmpty.style.display = 'block';
      return;
    }
    els.tocListEmpty.style.display = 'none';
    currentToc.forEach((t, idx) => {
      const row = document.createElement('div');
      row.className = 'toc-item';

      const text = document.createElement('div');
      text.className = 'toc-text';
      const nameEl = document.createElement('div');
      nameEl.className = 'toc-name';
      nameEl.textContent = t.name;
      const pageEl = document.createElement('div');
      pageEl.className = 'toc-page';
      pageEl.textContent = t.page + 'ページ';
      text.appendChild(nameEl);
      text.appendChild(pageEl);
      text.addEventListener('click', () => {
        closeTocList();
        jumpToPage(t.page);
      });

      const saveBtn = document.createElement('button');
      saveBtn.textContent = '切り出して保存';
      saveBtn.title = 'この目次から次の目次の前までを1つの本として保存';
      saveBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        saveTocRangeAsBook(t, idx);
      });

      const delBtn = document.createElement('button');
      delBtn.textContent = '削除';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('「' + t.name + '」を目次から削除します。本当によろしいですか？')) return;
        currentToc = currentToc.filter((x) => x !== t);
        saveCurrentToc();
        renderTocList();
      });

      row.appendChild(text);
      row.appendChild(saveBtn);
      row.appendChild(delBtn);
      els.tocListItems.appendChild(row);
    });
  }

  function openTocList() {
    if (!currentToc.length) { flashStatus('目次はまだ追加されていません'); return; }
    renderTocList();
    els.tocOverlay.classList.add('show');
  }
  function closeTocList() { els.tocOverlay.classList.remove('show'); }
  function isTocListOpen() { return els.tocOverlay.classList.contains('show'); }

  // ---------- series / next-volume (シリーズ・次の巻) ----------
  // Resolves the series/volume of whatever manga is currently open. Prefers
  // currentItem (set by openItem whenever the manga was opened from a saved
  // item — folder, list, feed, 履歴, resume-as-item, or the 次の巻 banner
  // itself); falls back to matching savedItems by base URL for a manga
  // opened directly via 新規 or a plain-URL resume, so series info still
  // works even without going through the saved list first.
  // Resolves the saved item object behind whatever manga is currently open —
  // prefers currentItem (set by openItem), and otherwise falls back to
  // matching savedItems by base URL, so a manga opened directly via 新規 (or
  // resumed as a plain URL) still resolves to its 履歴 entry once one exists.
  // Returns null for a custom manga with no baseUrl, or a manga that simply
  // has no corresponding saved item at all. Shared by the series/次の巻 lookup
  // and the reader's お気に入り toggle.
  function getCurrentItem() {
    if (currentItem) return currentItem;
    if (currentlyCustom || !baseUrl) return null;
    return savedItems.find((it) => !Array.isArray(it.pages) && it.url && baseUrlKey(it.url) === baseUrlKey(baseUrl)) || null;
  }

  function getCurrentSeriesInfo() {
    const item = getCurrentItem();
    if (!item || !item.series || !item.volume) return null;
    return { series: item.series, volume: item.volume };
  }

  // Keeps the reader's topbar ♡/❤ button in sync with the underlying saved
  // item's favorite flag. Hidden entirely when the manga on screen doesn't
  // correspond to any saved item yet (e.g. a brand-new 新規 URL before its
  // 履歴 entry exists).
  function updateFavToggleButton() {
    const item = getCurrentItem();
    if (!item) {
      els.favToggleBtn.style.display = 'none';
      return;
    }
    els.favToggleBtn.style.display = '';
    els.favToggleBtn.innerHTML = '';
    els.favToggleBtn.appendChild(makeHeartIcon(!!item.favorite));
    els.favToggleBtn.title = item.favorite ? 'お気に入りから外す' : 'お気に入りに追加';
  }

  // 閉じるボタンは、何らかの漫画が画面に表示されている間（pages が埋まって
  // いる間）だけ表示する。新規/履歴/リストどこから開いても、また失敗して
  // placeholder に戻ったときも、この1関数を呼べば状態に同期する。
  function updateCloseButtonVisibility() {
    els.closeBtn.style.display = pages.length ? '' : 'none';
  }

  function findNextVolumeItem(seriesInfo) {
    if (!seriesInfo) return null;
    return savedItems.find((it) => it.series === seriesInfo.series && it.volume === seriesInfo.volume + 1) || null;
  }

  // Shows/hides the "次の巻" banner based on whether we're truly sitting on
  // the manga's last page (for a normal 連番URL manga, only once page
  // detection has finished — otherwise "last page so far" could just mean
  // detection hasn't caught up yet) and whether a saved item for the next
  // volume of the same series exists.
  function updateNextVolumeBanner() {
    const atLastPage = pages.length > 0 && currentPage === pages.length && (currentlyCustom || detectionDone);
    if (!atLastPage || nextVolumeDismissed) { hideNextVolumeBanner(); return; }
    const nextItem = findNextVolumeItem(getCurrentSeriesInfo());
    if (!nextItem) { hideNextVolumeBanner(); return; }
    pendingNextVolumeItem = nextItem;
    els.nextVolumeText.textContent = '次の巻: ' + itemDisplayTitle(nextItem);
    els.nextVolumeBanner.classList.add('show');
  }
  function hideNextVolumeBanner() {
    pendingNextVolumeItem = null;
    els.nextVolumeBanner.classList.remove('show');
  }

  function exportData() {
    const data = { folders: savedFolders, items: savedItems };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'manga_reader_urls.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // Shared by 読み込み (file import) and GitHub からの読み込み: validates the
  // {folders, items} shape, confirms with the user, then replaces the local
  // list and persists/re-renders. Returns whether the replace happened.
  function applyImportedData(data) {
    if (!data || !Array.isArray(data.folders) || !Array.isArray(data.items)) {
      flashStatus('データの形式が正しくありません');
      return false;
    }
    if (!confirm('読み込んだ内容でローカルのリストを置き換えます。よろしいですか？')) return false;
    savedFolders = data.folders;
    savedItems = data.items;
    persistFolders();
    persistItems();
    if (isSavedListOpen()) renderSavedList();
    return true;
  }

  function importDataFromFile(file) {
    file.text().then((text) => {
      let data;
      try { data = JSON.parse(text); } catch (e) { flashStatus('ファイル形式が正しくありません'); return; }
      if (applyImportedData(data)) flashStatus('読み込みました');
    }).catch(() => flashStatus('読み込みに失敗しました'));
  }

  // ---------- GitHub sync (private repo, Contents API) ----------
  // Alternative to the manual 書き出し/読み込み file dance: pushes/pulls the
  // exact same {folders, items} JSON to/from a single file in a private
  // GitHub repository the user controls, via the Contents API directly from
  // the browser (api.github.com allows CORS for GET/PUT with an Authorization
  // header). The repo, file path, and personal access token are entered once
  // in the GitHubで同期 dialog and kept only in this browser's localStorage —
  // never written into this app's own (public) repo or any committed file.
  const GITHUB_SYNC_KEY = 'mangaReaderGithubSync'; // {repo: 'owner/name', path, token}

  function loadGithubSyncSettings() {
    try { return JSON.parse(localStorage.getItem(GITHUB_SYNC_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function persistGithubSyncSettings(settings) {
    try { localStorage.setItem(GITHUB_SYNC_KEY, JSON.stringify(settings)); } catch (e) {}
  }

  // btoa/atob only handle Latin1, but titles/folder names are Japanese, so
  // route through TextEncoder/TextDecoder to round-trip multi-byte UTF-8
  // correctly through GitHub's base64 file content.
  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    bytes.forEach((b) => { binary += String.fromCharCode(b); });
    return btoa(binary);
  }
  function base64ToUtf8(b64) {
    const binary = atob(b64.replace(/\n/g, ''));
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function githubApiUrl(settings) {
    return 'https://api.github.com/repos/' + settings.repo + '/contents/' + settings.path;
  }
  function setGithubSyncStatus(msg) { els.githubSyncStatus.textContent = msg; }

  function openGithubSyncDialog() {
    githubSyncReturnToList = isSavedListOpen();
    if (githubSyncReturnToList) closeSavedList();
    const settings = loadGithubSyncSettings();
    els.githubRepoInput.value = settings.repo || '';
    els.githubPathInput.value = settings.path || 'data.json';
    els.githubTokenInput.value = settings.token || '';
    setGithubSyncStatus('');
    els.githubSyncOverlay.classList.add('show');
    if (!settings.repo || !settings.token) fillGithubFieldsFromKeychain();
  }
  function closeGithubSyncDialog() {
    els.githubSyncOverlay.classList.remove('show');
    if (githubSyncReturnToList) {
      githubSyncReturnToList = false;
      reopenSavedList();
    }
  }
  function isGithubSyncOpen() { return els.githubSyncOverlay.classList.contains('show'); }

  function saveGithubSyncSettingsFromForm() {
    const repo = els.githubRepoInput.value.trim();
    const path = els.githubPathInput.value.trim() || 'data.json';
    const token = els.githubTokenInput.value.trim();
    if (!repo || !repo.includes('/')) {
      setGithubSyncStatus('リポジトリは "owner/repo" の形式で入力してください');
      return;
    }
    if (!token) {
      setGithubSyncStatus('個人アクセストークンを入力してください');
      return;
    }
    persistGithubSyncSettings({ repo, path, token });
    storeGithubCredential(repo, token);
    setGithubSyncStatus('この端末に設定を保存しました');
  }

  // Safari (WebKit) は PasswordCredential / navigator.credentials.store に対応しており、
  // これを呼ぶとフォーム送信のヒューリスティックに頼らず確実に「パスワードを保存」
  // ダイアログを出せる。iCloudキーチェーンに保存されれば、同じApple IDの他の
  // Safari（他デバイス）にも自動で同期されるため、トークンの手入力なしに
  // fillGithubFieldsFromKeychain() で呼び出し元を補完できる。対応していない
  // ブラウザでは何もしない（=従来通りlocalStorageのみで動作）。
  function storeGithubCredential(repo, token) {
    if (typeof PasswordCredential === 'undefined' || !navigator.credentials || !navigator.credentials.store) return;
    try {
      const cred = new PasswordCredential({ id: repo, password: token, name: 'GitHub同期 (manga reader)' });
      navigator.credentials.store(cred).catch(() => {});
    } catch (e) { /* 対応ブラウザでも環境によって失敗することがあるため無視 */ }
  }

  // この端末のlocalStorageに設定がまだ無いとき（＝新しい端末・新しいブラウザ
  // データでこのダイアログを開いたとき）に、ブラウザのパスワードマネージャー
  // （Safariならキーチェーン、iCloud経由で他デバイスと同期されている可能性がある）
  // に保存済みの認証情報があれば取得してフォームを埋める。ユーザーの明示的な
  // 操作（ダイアログを開く）に応じて呼ぶだけで、無断で自動送信などはしない。
  function fillGithubFieldsFromKeychain() {
    if (!navigator.credentials || !navigator.credentials.get) return;
    navigator.credentials.get({ password: true, mediation: 'optional' }).then((cred) => {
      if (!cred || cred.type !== 'password') return;
      if (!els.githubRepoInput.value && cred.id) els.githubRepoInput.value = cred.id;
      if (!els.githubTokenInput.value && cred.password) els.githubTokenInput.value = cred.password;
    }).catch(() => {});
  }

  function describeGithubError(e) {
    const msg = (e && e.message) || '';
    if (msg.indexOf('401') !== -1 || msg.indexOf('403') !== -1) return 'トークンが無効、または権限が不足しています。設定を確認してください。';
    if (msg.indexOf('404') !== -1) return 'リポジトリが見つかりません。owner/repo の表記を確認してください。';
    if (msg.indexOf('409') !== -1) return '他の端末からの更新と競合しました。もう一度「GitHubから読み込む」→「GitHubに保存する」をやり直してください。';
    return '通信エラーが発生しました: ' + msg;
  }

  // Fetches the current file (if any) so its sha can be sent back on PUT —
  // GitHub requires the existing blob's sha to update a file and rejects the
  // write (409) without it. Returns {sha: null, data: null} if the file
  // doesn't exist yet, which is the normal first-sync case.
  async function githubFetchFile(settings) {
    const res = await fetch(githubApiUrl(settings), {
      headers: {
        'Authorization': 'Bearer ' + settings.token,
        'Accept': 'application/vnd.github+json',
      },
    });
    if (res.status === 404) return { sha: null, data: null };
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    let data = null;
    try { data = JSON.parse(base64ToUtf8(json.content || '')); } catch (e) { /* leave null; caller decides */ }
    return { sha: json.sha, data: data };
  }

  async function githubPush() {
    const settings = loadGithubSyncSettings();
    if (!settings.repo || !settings.token) {
      setGithubSyncStatus('先にリポジトリとトークンを保存してください');
      return;
    }
    els.githubPushBtn.disabled = true;
    setGithubSyncStatus('GitHubに保存中...');
    try {
      const existing = await githubFetchFile(settings);
      const payload = { folders: savedFolders, items: savedItems };
      const body = {
        message: 'manga reader: sync ' + new Date().toISOString(),
        content: utf8ToBase64(JSON.stringify(payload, null, 2)),
      };
      if (existing.sha) body.sha = existing.sha;
      const res = await fetch(githubApiUrl(settings), {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + settings.token,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const detail = await res.text().catch(() => '');
        throw new Error('HTTP ' + res.status + (detail ? ': ' + detail.slice(0, 200) : ''));
      }
      setGithubSyncStatus('GitHubに保存しました（' + new Date().toLocaleString() + '）');
    } catch (e) {
      setGithubSyncStatus(describeGithubError(e));
    } finally {
      els.githubPushBtn.disabled = false;
    }
  }

  async function githubPull() {
    const settings = loadGithubSyncSettings();
    if (!settings.repo || !settings.token) {
      setGithubSyncStatus('先にリポジトリとトークンを保存してください');
      return;
    }
    els.githubPullBtn.disabled = true;
    setGithubSyncStatus('GitHubから取得中...');
    try {
      const existing = await githubFetchFile(settings);
      if (!existing.data) {
        setGithubSyncStatus('まだGitHub側にデータがありません（先に「GitHubに保存する」を実行してください）');
        return;
      }
      if (applyImportedData(existing.data)) {
        setGithubSyncStatus('GitHubから読み込みました（' + new Date().toLocaleString() + '）');
      } else {
        setGithubSyncStatus('');
      }
    } catch (e) {
      setGithubSyncStatus(describeGithubError(e));
    } finally {
      els.githubPullBtn.disabled = false;
    }
  }

  // Normalizes a base URL for identity comparisons: scheme (http/https) and
  // host case differences shouldn't make two saves count as "different".
  function baseUrlKey(url) {
    try {
      const u = new URL(url);
      return u.hostname.toLowerCase() + u.pathname;
    } catch (e) {
      return (url || '').trim().replace(/^https?:\/\//i, '').toLowerCase();
    }
  }

  // The "履歴" folder is a reserved, always-present folder that auto-collects
  // every manga opened via the "新規" button. Created on first use.
  function ensureHistoryFolder() {
    if (!savedFolders.some((f) => f.id === HISTORY_FOLDER_ID)) {
      savedFolders.unshift({ id: HISTORY_FOLDER_ID, name: HISTORY_FOLDER_NAME });
    }
  }

  // Auto-adds a newly opened manga to 履歴 (no title prompt: title is derived
  // from the URL). Re-opening the same manga moves its history entry to the
  // top instead of piling up duplicates.
  function addToHistory(url) {
    ensureHistoryFolder();
    savedItems = savedItems.filter((it) => !(it.folderId === HISTORY_FOLDER_ID && baseUrlKey(it.url) === baseUrlKey(url)));
    savedItems.unshift({
      id: genId('i'),
      url: url,
      title: deriveTitleFromUrl(url),
      folderId: HISTORY_FOLDER_ID,
      addedAt: Date.now(),
    });
    persistAll();
    updateCurrentTitleDisplay();
  }

  // If the URL currently being viewed matches a saved item (by base URL),
  // show that item's title in the header; otherwise clear it.
  function updateCurrentTitleDisplay() {
    // Custom items (explicit page list) set their own title directly in
    // startReadingCustom; baseUrl is empty for them, so don't let this
    // baseUrl-keyed lookup clear it (e.g. when an unrelated item is deleted
    // from the saved list while a custom manga is on screen). The favorite
    // button is still refreshed below regardless, since getCurrentItem()
    // handles the custom case itself (via currentItem).
    if (!currentlyCustom) {
      if (!baseUrl) {
        els.currentTitle.textContent = '';
      } else {
        const match = savedItems.find((it) => baseUrlKey(it.url) === baseUrlKey(baseUrl));
        els.currentTitle.textContent = match ? match.title : '';
      }
    }
    updateFavToggleButton();
  }

  function deriveTitleFromUrl(url) {
    try {
      const u = new URL(url);
      const path = u.pathname.replace(/\/+$/, '');
      const seg = path.split('/').filter(Boolean).pop();
      return seg ? decodeURIComponent(seg) : u.hostname;
    } catch (e) { return url; }
  }

  function loadSaved() {
    try { savedFolders = JSON.parse(localStorage.getItem(SAVED_FOLDERS_KEY) || '[]'); }
    catch (e) { savedFolders = []; }
    try { savedItems = JSON.parse(localStorage.getItem(SAVED_ITEMS_KEY) || '[]'); }
    catch (e) { savedItems = []; }

    // migrate from the older flat URL-list format if present and nothing migrated yet
    if (savedItems.length === 0) {
      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_SAVED_URLS_KEY) || '[]');
        if (Array.isArray(legacy) && legacy.length) {
          savedItems = legacy.map((it) => ({
            id: genId('i'),
            url: it.url,
            title: deriveTitleFromUrl(it.url),
            folderId: null,
            addedAt: it.addedAt || Date.now(),
          }));
          persistItems();
        }
      } catch (e) {}
    }
    ensureHistoryFolder();
  }
  loadSaved();

  // ---------- URL parsing ----------
  // Accepts either a folder URL ("https://example.com/manga/test/") or a direct
  // link to a numbered page ("https://example.com/manga/test/1.jpg") and returns
  // the normalized folder URL (always ending in "/") plus an extension hint.
  function parseInputUrl(input) {
    let v = (input || '').trim();
    if (!v) return null;
    if (!/^https?:\/\//i.test(v)) v = 'https://' + v;
    let hintExt = null;
    const m = v.match(/^(.*\/)\d+\.([A-Za-z0-9]+)(?:[?#].*)?$/);
    if (m) {
      v = m[1];
      const idx = EXT_CANDIDATES.indexOf(m[2].toLowerCase());
      if (idx !== -1) hintExt = idx;
    } else {
      // strip any query/hash if the user pasted a folder URL with one
      v = v.replace(/[?#].*$/, '');
    }
    if (!v.endsWith('/')) v += '/';
    return { baseUrl: v, hintExt: hintExt };
  }

  // ---------- image loading / detection ----------
  function loadImage(url) {
    return new Promise((resolve) => {
      const img = new Image();
      let done = false;
      const timer = setTimeout(() => {
        if (!done) { done = true; resolve(false); }
      }, LOAD_TIMEOUT_MS);
      img.onload = () => { if (!done) { done = true; clearTimeout(timer); resolve(true); } };
      img.onerror = () => { if (!done) { done = true; clearTimeout(timer); resolve(false); } };
      img.src = url;
    });
  }

  async function findPageUrl(pageNum) {
    const order = [preferredExt, ...EXT_CANDIDATES.map((_, i) => i).filter((i) => i !== preferredExt)];
    for (const idx of order) {
      const ext = EXT_CANDIDATES[idx];
      const url = baseUrl + pageNum + '.' + ext;
      const ok = await loadImage(url);
      if (ok) { preferredExt = idx; return url; }
    }
    return null;
  }

  // Preloads just page 1 of another manga (used for swipe-list neighbors).
  // Doesn't know the right extension ahead of time, so it cascades through
  // EXT_CANDIDATES like findPageUrl. A successful loadImage() call leaves
  // the browser's image cache primed, so the actual <img> shown later by
  // startReading()/renderPage() (or a live drag neighbor slide) loads
  // instantly. Returns the resolved URL (with extension) once found, or
  // null if none of the candidates loaded — callers use this to populate
  // resolvedListPageUrl for the live vertical drag.
  async function preloadFirstPage(baseUrlForItem) {
    for (const ext of EXT_CANDIDATES) {
      const url = baseUrlForItem + '1.' + ext;
      const ok = await loadImage(url);
      if (ok) return url;
    }
    return null;
  }

  // url: the manga's folder/page URL. addToHistoryFlag: true when this open
  // should be auto-recorded into 履歴 (used for the "新規" button only).
  // switchDirection ('up'/'down') means this call was triggered by a
  // vertical swipe inside the reader (see goToReadingListOffset). In that
  // case we keep the outgoing manga's page on screen instead of blanking to
  // a spinner, so renderPage can do a real vertical slide once the new
  // manga's first page is ready — that's what makes the swipe feel live
  // instead of an instant cut.
  async function startReading(url, addToHistoryFlag, switchDirection) {
    const parsed = parseInputUrl(url);
    if (!parsed) return;
    // Each call gets its own "generation" number. If a newer startReading()
    // call comes in before this one finishes (e.g. the user opens another
    // manga, or re-opens one from 履歴/list, while the previous one is still
    // detecting pages in the background), the stale call's still-pending
    // findPageUrl()/detectMorePages() work must not be allowed to keep
    // pushing into the shared `pages` array — that's what was causing pages
    // to occasionally show up twice. Every await below is followed by a
    // check that this call is still the current generation.
    const myGeneration = ++readingGeneration;
    baseUrl = parsed.baseUrl;
    currentResumeKey = baseUrl;
    currentlyCustom = false;
    loadCurrentToc();
    hideNextVolumeBanner();
    preferredExt = parsed.hintExt !== null ? parsed.hintExt : 0;
    try { localStorage.setItem(LAST_URL_KEY, JSON.stringify({ kind: 'url', value: baseUrl })); } catch (e) {}
    updateCurrentTitleDisplay();
    if (addToHistoryFlag) addToHistory(baseUrl);

    pages = [];
    detecting = true;
    detectionDone = false;
    detectionHitLimit = false;
    currentPage = 1;
    pendingResumePage = getResumePage(baseUrl);
    els.readProgressBar.style.width = '0%'; // avoid a stale bar from the previous manga flashing during the lookup

    els.newBtn.disabled = true;
    if (!switchDirection) {
      // Normal open (新規/list/resume): no prior page to keep showing, so
      // blank to a spinner while page 1 is located, same as always.
      els.placeholder.style.display = 'none';
      els.imgWrap.style.display = 'none';
      els.spinner.style.display = 'block';
    }
    els.status.textContent = '1ページ目を確認中...';

    const firstUrl = await findPageUrl(1);
    if (myGeneration !== readingGeneration) return; // superseded while we were checking page 1
    els.newBtn.disabled = false;

    if (!firstUrl) {
      els.spinner.style.display = 'none';
      els.imgWrap.style.display = 'none';
      els.placeholder.style.display = 'block';
      els.placeholder.innerHTML =
        '1ページ目が見つかりませんでした。<br>' +
        '試したURL: ' + EXT_CANDIDATES.map((e) => '<code>' + baseUrl + '1.' + e + '</code>').join(' / ') + '<br>' +
        'URLや拡張子を確認してください。';
      els.status.textContent = '';
      detecting = false;
      updateCloseButtonVisibility();
      return;
    }

    pages.push(firstUrl);
    els.spinner.style.display = 'none';
    els.imgWrap.style.display = 'block';
    els.controls.style.display = 'flex';
    showPage(1, switchDirection === 'up' ? 'swipeUp' : switchDirection === 'down' ? 'swipeDown' : null);
    updateStatus();
    updateCloseButtonVisibility();
    detectMorePages(2, myGeneration);
  }

  // Checks pages in batches of DETECT_BATCH_SIZE in parallel (instead of one
  // at a time) so detection time no longer grows linearly with page count —
  // each round-trip now resolves up to DETECT_BATCH_SIZE pages at once. The
  // pages within a resolved batch are still pushed/shown in order, and the
  // first missing page found within a batch is treated as the end (same
  // "first gap = end of manga" assumption the old sequential loop made).
  async function detectMorePages(startPage, generation) {
    let pageNum = startPage;
    while (pageNum <= MAX_PAGES_SAFETY) {
      const batchNums = [];
      for (let i = 0; i < DETECT_BATCH_SIZE && pageNum + i <= MAX_PAGES_SAFETY; i++) batchNums.push(pageNum + i);
      const results = await Promise.all(batchNums.map((n) => findPageUrl(n)));
      if (generation !== readingGeneration) return; // a newer manga was opened meanwhile; abandon this stale loop

      let hitEnd = false;
      for (const url of results) {
        if (!url) { hitEnd = true; break; }
        pages.push(url);
        pageNum++;
        updateStatus();
        updateSlider();
        if (pendingResumePage !== null && pages.length === pendingResumePage) {
          jumpToPage(pendingResumePage);
          pendingResumePage = null;
        }
      }
      if (hitEnd) {
        detectionDone = true;
        detecting = false;
        updateStatus();
        updateSlider();
        persistLastPage();
        updateNextVolumeBanner();
        return;
      }
    }
    if (generation !== readingGeneration) return;
    detectionHitLimit = true;
    detectionDone = true;
    detecting = false;
    updateStatus();
    updateSlider();
    persistLastPage();
    updateNextVolumeBanner();
  }

  // Opens a "custom" manga: one whose pages were supplied as an explicit,
  // non-sequential URL list via the 個別追加 dialog (see
  // confirmCustomAdd) rather than a base URL + guessed-extension sequence.
  // All pages are already known up front, so there's no async detection
  // loop — just show the (resume) page immediately. switchDirection mirrors
  // startReading's vertical-swipe handling so swiping into a custom manga
  // animates the same way.
  function startReadingCustom(item, switchDirection) {
    readingGeneration++; // invalidate any still-running sequential detection loop
    baseUrl = '';
    currentResumeKey = 'custom:' + item.id;
    currentlyCustom = true;
    loadCurrentToc();
    hideNextVolumeBanner();
    pages = (item.pages || []).slice();
    detecting = false;
    detectionDone = true;
    detectionHitLimit = false;
    currentPage = 1;
    pendingResumePage = getResumePage(currentResumeKey);

    els.currentTitle.textContent = item.title || '無題';
    updateFavToggleButton();
    try { localStorage.setItem(LAST_URL_KEY, JSON.stringify({ kind: 'item', itemId: item.id })); } catch (e) {}

    if (!pages.length) {
      els.spinner.style.display = 'none';
      els.imgWrap.style.display = 'none';
      els.placeholder.style.display = 'block';
      els.placeholder.textContent = 'このアイテムにはページがありません。';
      els.status.textContent = '';
      updateCloseButtonVisibility();
      return;
    }

    if (!switchDirection) {
      els.placeholder.style.display = 'none';
      els.spinner.style.display = 'none';
    }
    els.imgWrap.style.display = 'block';
    els.controls.style.display = 'flex';
    const startPage = pendingResumePage || 1;
    pendingResumePage = null;
    showPage(startPage, switchDirection === 'up' ? 'swipeUp' : switchDirection === 'down' ? 'swipeDown' : null);
    updateStatus();
    updateCloseButtonVisibility();
  }

  // Single entry point for opening a saved item, regardless of whether it's
  // a normal 連番ベースURL manga or a custom (explicit page list) manga
  // added via the 個別追加 dialog. Use this (not startReading
  // directly) for anything that opens an *item* object rather than a raw
  // typed-in URL.
  function openItem(item, addToHistoryFlag, switchDirection) {
    currentItem = item || null; // remembered for series/次の巻 lookups
    if (item && Array.isArray(item.pages) && item.pages.length) {
      startReadingCustom(item, switchDirection);
    } else {
      startReading(item.url, addToHistoryFlag, switchDirection);
    }
  }

  // 表示中の漫画を閉じて、ビューアを「何も開いていない」状態に戻す。進行中の
  // ページ検出があれば readingGeneration を進めて無効化し、次回再読み込みでも
  // 閉じた漫画が復元されないよう LAST_URL_KEY も消す。何も開いていない状態に
  // なるので、リスト（保存したURL）を自動的に開く。
  function closeManga() {
    readingGeneration++;
    baseUrl = '';
    pages = [];
    currentResumeKey = '';
    currentlyCustom = false;
    currentItem = null;
    currentToc = [];
    detecting = false;
    detectionDone = false;
    detectionHitLimit = false;
    clearReadingListContext();
    hideNextVolumeBanner();

    els.spinner.style.display = 'none';
    els.imgWrap.style.display = 'none';
    els.controls.style.display = 'none';
    els.placeholder.style.display = 'none';
    els.placeholder.innerHTML = '';
    els.status.textContent = '';
    els.currentTitle.textContent = '';
    updateFavToggleButton();
    updateCloseButtonVisibility();
    updateTocButtonVisibility();
    try { localStorage.removeItem(LAST_URL_KEY); } catch (e) {}

    openSavedList(true);
  }

  function updateStatus() {
    if (detecting) {
      els.status.textContent = '検出中... ' + pages.length + 'ページ確認済み';
    } else if (detectionHitLimit) {
      els.status.textContent = pages.length + 'ページ以上（検出上限）';
    } else if (detectionDone) {
      els.status.textContent = '全 ' + pages.length + ' ページ';
    }
  }

  function flashStatus(msg) {
    els.status.textContent = msg;
    setTimeout(updateStatus, 1500);
  }

  // ---------- page rendering / navigation ----------
  function styleImg(img) {
    const mode = fitModes[fitIndex];
    img.style.maxWidth = '100%';
    img.style.maxHeight = '';
    img.style.width = '';
    img.style.height = '';
    img.style.objectFit = '';
    if (mode === 'fit-contain') {
      // Topbar/controls float on top of the viewer (not beside it), so the
      // image can always use the full viewport height; hiding the bars
      // reveals more of the image instead of leaving blank space.
      img.style.maxHeight = '100vh';
      img.style.width = 'auto';
      img.style.height = 'auto';
      img.style.objectFit = 'contain';
    } else if (mode === 'fit-width') {
      img.style.width = '100%';
      img.style.height = 'auto';
    } else { // fit-height
      img.style.height = '100vh';
      img.style.width = 'auto';
    }
  }

  function makeImgFromUrl(url, alt) {
    const img = document.createElement('img');
    img.className = 'pageimg';
    img.alt = alt || '';
    img.src = url;
    styleImg(img);
    return img;
  }
  function makeImg(pNum) {
    return makeImgFromUrl(pages[pNum - 1], 'page ' + pNum);
  }
  // Builds a detached .pageSlide (not yet attached to the DOM) wrapping a
  // single image at the given URL. Used by the live-drag controller to show
  // a neighbor page/manga sliding in alongside the current one — unlike
  // renderPage(), this doesn't wait for the load event, since by drag time
  // the URL has almost always already been preloaded into the browser
  // cache (see preloadAdjacentManga/preload), so it paints immediately.
  function makeSlide(url) {
    const slide = document.createElement('div');
    slide.className = 'pageSlide';
    slide.appendChild(makeImgFromUrl(url));
    return slide;
  }

  // 'next'/'prev' are horizontal page turns within the same manga.
  // 'swipeUp'/'swipeDown' are vertical manga switches (一覧 swipe), entering
  // and exiting along Y instead of X — same crossfade-and-slide mechanism,
  // different axis, so it actually reads as a swipe instead of a hard cut.
  const DIR_TRANSFORMS = {
    next:      { enter: 'translateX(100%)',  exit: 'translateX(-100%)' },
    prev:      { enter: 'translateX(-100%)', exit: 'translateX(100%)' },
    swipeUp:   { enter: 'translateY(100%)',  exit: 'translateY(-100%)' },
    swipeDown: { enter: 'translateY(-100%)', exit: 'translateY(100%)' },
  };

  // Renders page n into the stage, but only once its image has actually
  // finished loading. Until then, whatever was previously on screen stays
  // visible instead of being replaced by a blank/black frame. If the page
  // changes again before this one finishes loading, the stale result is
  // dropped (latestRenderId guard) so a slow load can't clobber a newer page.
  function renderPage(n, direction) {
    if (suppressNextRenderAnim) {
      direction = null; // the live drag already animated this transition visually
      suppressNextRenderAnim = false;
    }
    const myId = ++latestRenderId;
    const img = makeImg(n);

    const doRender = () => {
      if (myId !== latestRenderId) return;

      const newSlide = document.createElement('div');
      newSlide.className = 'pageSlide';
      newSlide.appendChild(img);

      const prevSlide = els.pageStage.querySelector('.pageSlide.current');
      const t = direction && DIR_TRANSFORMS[direction];

      if (animEnabled && t && prevSlide) {
        newSlide.style.transform = t.enter;
        els.pageStage.appendChild(newSlide);
        prevSlide.classList.remove('current');
        void newSlide.offsetWidth; // force layout before animating
        newSlide.style.transition = 'transform ' + ANIM_DURATION + 'ms ease';
        prevSlide.style.transition = 'transform ' + ANIM_DURATION + 'ms ease';
        requestAnimationFrame(() => {
          newSlide.style.transform = 'translate(0, 0)';
          prevSlide.style.transform = t.exit;
        });
        newSlide.classList.add('current');
        setTimeout(() => { if (prevSlide.parentNode) prevSlide.parentNode.removeChild(prevSlide); }, ANIM_DURATION + 60);
      } else {
        els.pageStage.innerHTML = '';
        newSlide.classList.add('current');
        els.pageStage.appendChild(newSlide);
      }
    };

    if (img.complete) {
      doRender();
    } else {
      img.addEventListener('load', doRender, { once: true });
      img.addEventListener('error', doRender, { once: true });
    }
  }

  function updateSlider() {
    els.pageSlider.max = Math.max(pages.length, currentPage);
    els.pageSlider.value = currentPage;
    const totalLabel = detectionDone ? pages.length : pages.length + '+';
    els.pageLabel.textContent = currentPage + ' / ' + totalLabel;
    els.readProgressBar.style.width = pages.length ? Math.round((currentPage / pages.length) * 100) + '%' : '0%';
  }

  function preload(pageNum) {
    if (pageNum >= 1 && pageNum <= pages.length) {
      const img = new Image();
      img.src = pages[pageNum - 1];
    }
  }

  // Resolved URL of the page right after/before the one on screen, if known
  // yet — used by the live horizontal drag to build its neighbor slide. The
  // existing preload() calls in showPage() already keep a few pages ahead
  // warmed in the browser cache, so by drag time these are normally instant.
  function nextPageNeighborUrl() { return currentPage < pages.length ? pages[currentPage] : null; }
  function prevPageNeighborUrl() { return currentPage > 1 ? pages[currentPage - 2] : null; }

  function showPage(n, forceDirection) {
    if (!pages.length) return;
    if (n < 1) n = 1;
    if (n > pages.length) n = pages.length;
    const hasCurrent = !!els.pageStage.querySelector('.pageSlide');
    const direction = forceDirection || (!hasCurrent ? null : (n > currentPage ? 'next' : (n < currentPage ? 'prev' : null)));
    currentPage = n;
    renderPage(n, direction);
    updateSlider();
    for (let i = 1; i <= 5; i++) preload(n + i);
    preload(n - 1);
    persistLastPage();
    nextVolumeDismissed = false;
    updateNextVolumeBanner();
  }

  // Instant, non-animated jump used when resuming to a saved page on load.
  function jumpToPage(n) {
    if (!pages.length) return;
    if (n < 1) n = 1;
    if (n > pages.length) n = pages.length;
    currentPage = n;
    renderPage(n, null);
    updateSlider();
    for (let i = 1; i <= 5; i++) preload(n + i);
    preload(n - 1);
    persistLastPage();
    nextVolumeDismissed = false;
    updateNextVolumeBanner();
  }

  function nextPage() { if (currentPage < pages.length) showPage(currentPage + 1); }
  function prevPage() { if (currentPage > 1) showPage(currentPage - 1); }
  function goFirst() { showPage(1); }
  function goLast() { showPage(pages.length); }

  function refreshCurrentView() {
    if (pages.length) renderPage(currentPage, null);
  }

  function toggleBars() {
    els.topbar.classList.toggle('hidden');
    els.controls.classList.toggle('hidden');
  }

  function toggleAnim() {
    animEnabled = !animEnabled;
    els.animBtn.classList.toggle('active', animEnabled);
    persistAnim();
  }

  // ---------- vertical swipe in reader: jump to next/prev manga in list ----------
  function goToReadingListOffset(offset) {
    if (!readingListItems.length) return; // opened without folder/feed context; nothing to swipe to
    const newIndex = readingListIndex + offset;
    if (newIndex < 0 || newIndex >= readingListItems.length) {
      flashStatus(offset > 0 ? 'これが最後の作品です' : 'これが最初の作品です');
      return;
    }
    readingListIndex = newIndex;
    preloadAdjacentManga();
    const item = readingListItems[newIndex];
    // offset > 0 (swiped up, moving to the next item) slides the new page in
    // from the bottom; offset < 0 (swiped down, previous item) from the top.
    // openItem dispatches to startReading or startReadingCustom depending on
    // whether this item has a fixed (explicit page-list) page list.
    openItem(item, false, offset > 0 ? 'up' : 'down');
  }

  // ---------- live drag (TikTok-style connected swipe) ----------
  // Both axes share one drag controller: horizontal drags turn pages within
  // the current manga, vertical drags step through readingListItems (the
  // folder/feed the reader was opened from). While dragging, the current
  // page and the neighbor page/manga slide together 1:1 with the finger —
  // they're rigidly "attached" like a filmstrip, so it reads as one
  // continuous strip of content rather than a page flipping in place. On
  // release, the drag either finishes the transition (if dragged far or
  // fast enough) or springs back. This only runs when animEnabled is true;
  // with animations off, the legacy "decide-at-release, no live preview"
  // behavior below is used instead (cheaper, no DOM churn mid-drag).
  let touchStartX = 0, touchStartY = 0, touchActive = false;
  let dragAxis = null;       // null | 'x' | 'y' — locked once the gesture's dominant axis is clear
  let dragInfo = null;       // { kind:'page'|'manga', dir, offset?, blocked?, reason? }
  let dragCurrentSlide = null;
  let dragNeighborSlide = null;
  let lastMoveX = 0, lastMoveY = 0, lastMoveTime = 0;
  const VERTICAL_SWIPE_THRESHOLD = 60; // px — legacy-mode commit distance, and the "did they really mean it" gate for the boundary flash message in blocked drags
  const AXIS_LOCK_PX = 10;          // px of movement before committing to horizontal vs vertical
  const DRAG_COMMIT_FRACTION = 0.22; // must drag past 22% of the viewport dimension to commit (if not flicked)
  const DRAG_FLING_VELOCITY = 0.55;  // px/ms — a fast flick commits even with little travel distance
  const DRAG_FLING_MIN_PX = 24;      // minimum travel before a "fling" is trusted (filters out jitter)
  const RUBBER_BAND_FACTOR = 0.3;    // damping applied when dragging past a boundary (no neighbor to show)
  const MIN_DRAG_ANIM_MS = 80;

  function resetDragState() {
    dragAxis = null;
    dragInfo = null;
    dragCurrentSlide = null;
    dragNeighborSlide = null;
  }

  function beginDrag(axis, dx, dy) {
    const current = els.pageStage.querySelector('.pageSlide.current');
    if (!current) return; // nothing on screen to drag (e.g. spinner) — dragAxis stays null, caller bails
    dragCurrentSlide = current;
    dragCurrentSlide.style.transition = 'none';
    dragAxis = axis;
    if (axis === 'x') {
      const dir = dx < 0 ? 'next' : 'prev';
      const url = dir === 'next' ? nextPageNeighborUrl() : prevPageNeighborUrl();
      if (!url) { dragInfo = { kind: 'page', dir, blocked: true }; return; }
      dragInfo = { kind: 'page', dir };
      dragNeighborSlide = makeSlide(url);
      dragNeighborSlide.style.transform = dir === 'next' ? 'translateX(100%)' : 'translateX(-100%)';
    } else {
      const offset = dy < 0 ? 1 : -1; // swipe up = next manga, down = previous
      const dir = offset > 0 ? 'swipeUp' : 'swipeDown';
      const idx = readingListIndex + offset;
      const inBounds = idx >= 0 && idx < readingListItems.length;
      const url = inBounds ? resolvedListPageUrl.get(idx) : null;
      if (!url) { dragInfo = { kind: 'manga', dir, offset, blocked: true, reason: inBounds ? 'notReady' : 'edge' }; return; }
      dragInfo = { kind: 'manga', dir, offset };
      dragNeighborSlide = makeSlide(url);
      dragNeighborSlide.style.transform = dir === 'swipeUp' ? 'translateY(100%)' : 'translateY(-100%)';
    }
    dragNeighborSlide.style.transition = 'none';
    els.pageStage.appendChild(dragNeighborSlide);
  }

  function updateDragX(dx) {
    if (dragInfo.blocked) { dragCurrentSlide.style.transform = 'translateX(' + (dx * RUBBER_BAND_FACTOR) + 'px)'; return; }
    const clamped = dragInfo.dir === 'next' ? Math.min(dx, 0) : Math.max(dx, 0);
    dragCurrentSlide.style.transform = 'translateX(' + clamped + 'px)';
    const base = dragInfo.dir === 'next' ? '100%' : '-100%';
    dragNeighborSlide.style.transform = 'translateX(calc(' + base + ' + ' + clamped + 'px))';
  }
  function updateDragY(dy) {
    if (dragInfo.blocked) { dragCurrentSlide.style.transform = 'translateY(' + (dy * RUBBER_BAND_FACTOR) + 'px)'; return; }
    const clamped = dragInfo.dir === 'swipeUp' ? Math.min(dy, 0) : Math.max(dy, 0);
    dragCurrentSlide.style.transform = 'translateY(' + clamped + 'px)';
    const base = dragInfo.dir === 'swipeUp' ? '100%' : '-100%';
    dragNeighborSlide.style.transform = 'translateY(calc(' + base + ' + ' + clamped + 'px))';
  }

  // Applies the rest of showPage()'s / goToReadingListOffset()'s state
  // changes once a drag's own slide-in animation has visually finished —
  // the DOM swap already happened in commitDrag(), so this only updates
  // page/list bookkeeping (and, for manga switches, hands off to the
  // normal async open pipeline with suppressNextRenderAnim set so it
  // doesn't replay the transition a second time).
  function finalizeDragCommit(info) {
    if (info.kind === 'page') {
      currentPage = info.dir === 'next' ? currentPage + 1 : currentPage - 1;
      updateSlider();
      for (let i = 1; i <= 5; i++) preload(currentPage + i);
      preload(currentPage - 1);
      persistLastPage();
      nextVolumeDismissed = false;
      updateNextVolumeBanner();
    } else {
      suppressNextRenderAnim = true;
      goToReadingListOffset(info.offset);
    }
  }

  function commitDrag(axis, info, delta, dim) {
    const current = dragCurrentSlide, neighbor = dragNeighborSlide;
    // Hand off the "current" marker immediately (not after the animation
    // finishes) so a fast follow-up swipe started mid-transition queries
    // the right slide via .pageSlide.current — mirrors how renderPage()'s
    // own tap/keyboard-triggered transitions already do this synchronously.
    current.classList.remove('current');
    neighbor.classList.add('current');
    const finalCurrent = axis === 'x'
      ? (info.dir === 'next' ? 'translateX(-100%)' : 'translateX(100%)')
      : (info.dir === 'swipeUp' ? 'translateY(-100%)' : 'translateY(100%)');
    const remaining = Math.max(dim - Math.abs(delta), 0);
    const duration = Math.max(MIN_DRAG_ANIM_MS, Math.round(ANIM_DURATION * (remaining / dim)));
    current.style.transition = 'transform ' + duration + 'ms ease';
    neighbor.style.transition = 'transform ' + duration + 'ms ease';
    requestAnimationFrame(() => {
      current.style.transform = finalCurrent;
      neighbor.style.transform = 'translate(0, 0)';
    });
    setTimeout(() => {
      neighbor.style.transition = '';
      neighbor.style.transform = '';
      if (current.parentNode) current.parentNode.removeChild(current);
      finalizeDragCommit(info);
    }, duration + 30);
  }

  function cancelDrag(axis, info, delta, dim) {
    const current = dragCurrentSlide, neighbor = dragNeighborSlide;
    const neighborStart = axis === 'x'
      ? (info.dir === 'next' ? 'translateX(100%)' : 'translateX(-100%)')
      : (info.dir === 'swipeUp' ? 'translateY(100%)' : 'translateY(-100%)');
    const duration = Math.max(MIN_DRAG_ANIM_MS, Math.round(ANIM_DURATION * (Math.abs(delta) / dim)));
    current.style.transition = 'transform ' + duration + 'ms ease';
    neighbor.style.transition = 'transform ' + duration + 'ms ease';
    requestAnimationFrame(() => {
      current.style.transform = 'translate(0, 0)';
      neighbor.style.transform = neighborStart;
    });
    setTimeout(() => {
      if (neighbor.parentNode) neighbor.parentNode.removeChild(neighbor);
      current.style.transition = '';
      current.style.transform = '';
    }, duration + 30);
  }

  // No neighbor available (page/list boundary, or the adjacent manga's
  // first page hasn't resolved yet) — spring the current slide back to
  // rest. Only flashes the "最初/最後の作品です" message for a genuine
  // list boundary that was dragged with real intent, matching the
  // threshold the old (non-live) swipe used.
  function finishBlockedDrag(delta, info) {
    const current = dragCurrentSlide;
    current.style.transition = 'transform ' + MIN_DRAG_ANIM_MS + 'ms ease';
    requestAnimationFrame(() => { current.style.transform = 'translate(0, 0)'; });
    setTimeout(() => { current.style.transition = ''; current.style.transform = ''; }, MIN_DRAG_ANIM_MS + 30);
    if (info.kind === 'manga' && info.reason === 'edge' && Math.abs(delta) > VERTICAL_SWIPE_THRESHOLD) {
      flashStatus(info.offset > 0 ? 'これが最後の作品です' : 'これが最初の作品です');
    }
  }

  function onReaderTouchStart(e) {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    lastMoveX = touchStartX; lastMoveY = touchStartY; lastMoveTime = performance.now();
    touchActive = true;
    resetDragState();
  }
  function onReaderTouchMove(e) {
    if (!touchActive || e.touches.length !== 1) return;
    if (!animEnabled) { legacyOnReaderTouchMove(e); return; }
    const x = e.touches[0].clientX, y = e.touches[0].clientY;
    const dx = x - touchStartX, dy = y - touchStartY;
    if (dragAxis === null) {
      if (Math.abs(dx) < AXIS_LOCK_PX && Math.abs(dy) < AXIS_LOCK_PX) return; // not enough movement to decide yet
      beginDrag(Math.abs(dx) > Math.abs(dy) ? 'x' : 'y', dx, dy);
      if (dragAxis === null) return; // nothing draggable on screen right now
    }
    e.preventDefault(); // a real drag — don't let the browser also scroll/bounce
    if (dragAxis === 'x') updateDragX(dx); else updateDragY(dy);
    lastMoveX = x; lastMoveY = y; lastMoveTime = performance.now();
  }
  function onReaderTouchEnd(e) {
    if (!touchActive) return;
    touchActive = false;
    if (!animEnabled) { legacyOnReaderTouchEnd(e); return; }
    const touch = e.changedTouches[0];
    if (!touch || dragAxis === null) { resetDragState(); return; } // a plain tap — let the click zones handle it
    e.preventDefault(); // a real drag, not a tap — don't also trigger the tap-zone click
    const axis = dragAxis, info = dragInfo;
    const dx = touch.clientX - touchStartX, dy = touch.clientY - touchStartY;
    const delta = axis === 'x' ? dx : dy;
    const dim = axis === 'x' ? els.pageStage.clientWidth : els.pageStage.clientHeight;
    if (info.blocked) {
      finishBlockedDrag(delta, info);
    } else {
      const dt = Math.max(performance.now() - lastMoveTime, 1);
      const recentDelta = axis === 'x' ? (touch.clientX - lastMoveX) : (touch.clientY - lastMoveY);
      const velocity = Math.abs(recentDelta) / dt;
      const progress = Math.min(Math.abs(delta) / dim, 1);
      const shouldCommit = progress > DRAG_COMMIT_FRACTION ||
        (Math.abs(delta) > DRAG_FLING_MIN_PX && velocity > DRAG_FLING_VELOCITY);
      if (shouldCommit) commitDrag(axis, info, delta, dim);
      else cancelDrag(axis, info, delta, dim);
    }
    resetDragState();
  }

  // ---------- legacy (animEnabled === false) touch handling ----------
  // No live preview, no preloading dependency — decides everything at
  // touchend, same as before this feature existed. Kept as the fallback so
  // turning animations off still gives the cheapest possible interaction.
  function legacyOnReaderTouchMove(e) {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) e.preventDefault();
  }
  function legacyOnReaderTouchEnd(e) {
    const touch = e.changedTouches[0];
    if (!touch) return;
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > VERTICAL_SWIPE_THRESHOLD) {
      e.preventDefault();
      goToReadingListOffset(dy < 0 ? 1 : -1);
    }
  }

  els.imgWrap.addEventListener('touchstart', onReaderTouchStart, { passive: true });
  els.imgWrap.addEventListener('touchmove', onReaderTouchMove, { passive: false });
  els.imgWrap.addEventListener('touchend', onReaderTouchEnd, { passive: false });

  // ---------- save dialog ----------
  function renderFolderOptions(selectEl, selectedId) {
    selectEl.innerHTML = '';
    const optNone = document.createElement('option');
    optNone.value = '';
    optNone.textContent = 'フォルダなし';
    selectEl.appendChild(optNone);
    savedFolders.forEach((f) => {
      const o = document.createElement('option');
      o.value = f.id;
      o.textContent = f.name;
      selectEl.appendChild(o);
    });
    const optNew = document.createElement('option');
    optNew.value = '__new__';
    optNew.textContent = '+ 新しいフォルダを作成';
    selectEl.appendChild(optNew);
    selectEl.value = selectedId || '';
  }

  function openSaveDialog() {
    if (!baseUrl) { flashStatus('表示中の作品がありません'); return; }
    pendingSaveUrl = baseUrl;
    els.saveTitleInput.value = deriveTitleFromUrl(pendingSaveUrl);
    renderFolderOptions(els.saveFolderSelect, '');
    els.newFolderRow.style.display = 'none';
    els.newFolderInput.value = '';
    els.saveSeriesInput.value = '';
    els.saveVolumeInput.value = '';
    els.saveDialogOverlay.classList.add('show');
    els.saveTitleInput.focus();
  }
  function closeSaveDialog() {
    els.saveDialogOverlay.classList.remove('show');
    pendingSaveUrl = null;
  }
  function isSaveDialogOpen() { return els.saveDialogOverlay.classList.contains('show'); }

  function confirmSave() {
    if (!pendingSaveUrl) { closeSaveDialog(); return; }
    let folderId = els.saveFolderSelect.value;
    if (folderId === '__new__') folderId = '';
    // 履歴 entries don't count as "already saved" — every 新規-opened manga is
    // auto-recorded there, but that shouldn't block the user from also saving
    // it into a real folder. Only block if it's already saved somewhere else.
    const alreadySavedElsewhere = savedItems.some(
      (it) => it.folderId !== HISTORY_FOLDER_ID && baseUrlKey(it.url) === baseUrlKey(pendingSaveUrl)
    );
    if (alreadySavedElsewhere) {
      flashStatus('既に保存済みです');
      closeSaveDialog();
      return;
    }
    const seriesVal = els.saveSeriesInput.value.trim();
    let volumeVal = null;
    if (seriesVal) {
      const vol = parseInt(els.saveVolumeInput.value.trim(), 10);
      if (!els.saveVolumeInput.value.trim() || isNaN(vol) || vol <= 0) {
        flashStatus('シリーズ設定時は巻数を入力してください');
        return;
      }
      volumeVal = vol;
    }
    const title = els.saveTitleInput.value.trim() || deriveTitleFromUrl(pendingSaveUrl);
    savedItems.unshift({
      id: genId('i'),
      url: pendingSaveUrl,
      title: title,
      folderId: folderId || null,
      series: seriesVal || null,
      volume: volumeVal,
      favorite: false,
      addedAt: Date.now(),
    });
    persistAll();
    updateCurrentTitleDisplay();
    closeSaveDialog();
    flashStatus('保存しました');
  }

  // ---------- custom (explicit page-list) manga add dialog ----------
  // Lets the user add a manga whose pages aren't sequentially-numbered files
  // under one base URL — each page gets its own arbitrary URL, pasted one
  // per line, in reading order. Added directly to savedItems (no JSON
  // file involved); see openItem/startReadingCustom for how it's read back.
  // 個別追加/編集 dialogs are opened from inside the 保存したURL list popup,
  // so if that list is currently open it's hidden first (otherwise the two
  // overlays sit stacked on top of each other) and reopened — re-rendered,
  // so any change is reflected — once the dialog is closed.
  function reopenSavedList() {
    renderSavedList();
    els.savedListOverlay.classList.add('show');
  }

  function openCustomAddDialog() {
    customAddReturnToList = isSavedListOpen();
    if (customAddReturnToList) closeSavedList();
    els.customTitleInput.value = '';
    renderFolderOptions(els.customFolderSelect, '');
    els.customNewFolderRow.style.display = 'none';
    els.customNewFolderInput.value = '';
    els.customSeriesInput.value = '';
    els.customVolumeInput.value = '';
    els.customPagesTextarea.value = '';
    els.customAddOverlay.classList.add('show');
    els.customTitleInput.focus();
  }
  function closeCustomAddDialog() {
    els.customAddOverlay.classList.remove('show');
    if (customAddReturnToList) {
      customAddReturnToList = false;
      reopenSavedList();
    }
  }
  function isCustomAddDialogOpen() { return els.customAddOverlay.classList.contains('show'); }

  function confirmCustomAdd() {
    const pageUrls = els.customPagesTextarea.value
      .split('\n')
      .map((s) => s.trim())
      .filter(Boolean);
    if (!pageUrls.length) { flashStatus('ページURLを1つ以上入力してください'); return; }
    let folderId = els.customFolderSelect.value;
    if (folderId === '__new__') folderId = '';
    const seriesVal = els.customSeriesInput.value.trim();
    let volumeVal = null;
    if (seriesVal) {
      const vol = parseInt(els.customVolumeInput.value.trim(), 10);
      if (!els.customVolumeInput.value.trim() || isNaN(vol) || vol <= 0) {
        flashStatus('シリーズ設定時は巻数を入力してください');
        return;
      }
      volumeVal = vol;
    }
    const title = els.customTitleInput.value.trim() || ('無題' + (savedItems.length + 1));
    savedItems.unshift({
      id: genId('i'),
      title: title,
      folderId: folderId || null,
      series: seriesVal || null,
      volume: volumeVal,
      favorite: false,
      pages: pageUrls,
      addedAt: Date.now(),
    });
    persistAll();
    closeCustomAddDialog();
    flashStatus(pageUrls.length + 'ページの漫画を追加しました');
  }

  // ---------- edit saved item dialog (title/folder/URL, and for custom
  // items the page-URL list — lets pages be replaced or inserted) ----------
  function openEditItemDialog(item) {
    editingItemId = item.id;
    editReturnToList = isSavedListOpen();
    if (editReturnToList) closeSavedList();

    els.editTitleInput.value = itemDisplayTitle(item);
    renderFolderOptions(els.editFolderSelect, item.folderId || '');
    els.editNewFolderRow.style.display = 'none';
    els.editNewFolderInput.value = '';
    els.editSeriesInput.value = item.series || '';
    els.editVolumeInput.value = item.volume != null ? String(item.volume) : '';

    const isCustom = Array.isArray(item.pages);
    els.editUrlRow.style.display = isCustom ? 'none' : 'block';
    els.editPagesRow.style.display = isCustom ? 'block' : 'none';
    els.editUrlInput.value = item.url || '';
    els.editPagesTextarea.value = isCustom ? item.pages.join('\n') : '';

    els.editItemOverlay.classList.add('show');
    els.editTitleInput.focus();
  }
  function closeEditItemDialog() {
    els.editItemOverlay.classList.remove('show');
    editingItemId = null;
    if (editReturnToList) {
      editReturnToList = false;
      reopenSavedList();
    }
  }
  function isEditItemDialogOpen() { return els.editItemOverlay.classList.contains('show'); }

  function confirmEditItem() {
    const item = savedItems.find((it) => it.id === editingItemId);
    if (!item) { closeEditItemDialog(); return; }

    const seriesVal = els.editSeriesInput.value.trim();
    let volumeVal = null;
    if (seriesVal) {
      const vol = parseInt(els.editVolumeInput.value.trim(), 10);
      if (!els.editVolumeInput.value.trim() || isNaN(vol) || vol <= 0) {
        flashStatus('シリーズ設定時は巻数を入力してください');
        return;
      }
      volumeVal = vol;
    }

    const isCustom = Array.isArray(item.pages);
    if (isCustom) {
      const pageUrls = els.editPagesTextarea.value
        .split('\n')
        .map((s) => s.trim())
        .filter(Boolean);
      if (!pageUrls.length) { flashStatus('ページURLを1つ以上入力してください'); return; }
      item.pages = pageUrls; // replaces/inserts/removes pages, in the edited order
    } else {
      const newUrl = els.editUrlInput.value.trim();
      if (!newUrl) { flashStatus('URLを入力してください'); return; }
      const parsed = parseInputUrl(newUrl);
      item.url = parsed ? parsed.baseUrl : newUrl;
    }

    let folderId = els.editFolderSelect.value;
    if (folderId === '__new__') folderId = '';
    item.folderId = folderId || null;
    item.title = els.editTitleInput.value.trim() || itemDisplayTitle(item);
    item.series = seriesVal || null;
    item.volume = volumeVal;

    persistAll();
    updateCurrentTitleDisplay();
    closeEditItemDialog();
    flashStatus('更新しました');
  }

  // ---------- saved list (with folders) ----------
  // Every level (including the shallowest/top one) renders as a Kindle-style
  // bookshelf grid now: folders show as folder-icon cards, manga show as
  // page-1 cover cards (buildBookCard), side by side in the same grid.
  function buildFolderCard(folder) {
    const card = document.createElement('div');
    card.className = 'book-card folder-card';

    const cover = document.createElement('div');
    cover.className = 'book-cover folder-cover';
    const folderIcon = document.createElement('img');
    folderIcon.src = ICON_FOLDER;
    folderIcon.alt = 'フォルダ';
    cover.appendChild(folderIcon);

    // 履歴 is a reserved, auto-managed folder and can't be deleted as a whole.
    if (folder.id !== HISTORY_FOLDER_ID) {
      const delBtn = document.createElement('button');
      delBtn.className = 'book-delBtn';
      delBtn.textContent = '×';
      delBtn.title = '削除';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('「' + folder.name + '」フォルダと、その中のURLをすべて削除します。本当によろしいですか？')) return;
        savedItems = savedItems.filter((it) => it.folderId !== folder.id);
        savedFolders = savedFolders.filter((f) => f.id !== folder.id);
        persistAll();
        renderSavedList();
      });
      cover.appendChild(delBtn);
    }

    const title = document.createElement('div');
    title.className = 'book-title';
    title.textContent = folder.name;

    card.appendChild(cover);
    card.appendChild(title);
    card.addEventListener('click', () => {
      currentFolderView = folder.id;
      currentSeriesView = null;
      reorderMode = false;
      renderSavedList();
    });
    return card;
  }

  // お気に入り is a virtual aggregating folder (see FAVORITES_FOLDER_ID
  // comment above) — its card is built separately from buildFolderCard
  // since it isn't a real entry in savedFolders and can't be deleted.
  function buildFavoritesFolderCard() {
    const card = document.createElement('div');
    card.className = 'book-card folder-card';

    const cover = document.createElement('div');
    cover.className = 'book-cover folder-cover';
    cover.appendChild(makeHeartIcon(true));

    const title = document.createElement('div');
    title.className = 'book-title';
    title.textContent = FAVORITES_FOLDER_NAME;

    card.appendChild(cover);
    card.appendChild(title);
    card.addEventListener('click', () => {
      currentFolderView = FAVORITES_FOLDER_ID;
      currentSeriesView = null;
      reorderMode = false;
      renderSavedList();
    });
    return card;
  }

  // シリーズ も同じ理屈の仮想フォルダ。この「ルート」カードはシリーズ名一覧
  // (グループ分けされたシリーズの入口) に入るためのもの。実際のグルーピングは
  // renderSavedList側で行い、buildSeriesGroupCardで各シリーズの入口カードを作る。
  function buildSeriesFolderCard() {
    const card = document.createElement('div');
    card.className = 'book-card folder-card';

    const cover = document.createElement('div');
    cover.className = 'book-cover folder-cover';
    const seriesIcon = document.createElement('img');
    seriesIcon.src = ICON_BOOKS;
    seriesIcon.alt = 'シリーズ';
    cover.appendChild(seriesIcon);

    const title = document.createElement('div');
