
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連番画像 漫画リーダー</title>
<!-- Home screen (Add to Home Screen) icon and label for iOS Safari -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<meta name="apple-mobile-web-app-title" content="Books">
<style>
  :root {
    --bg: #0e0e10;
    --panel: #1a1a1e;
    --accent: #e0556f;
    --text: #e8e8ea;
    --sub: #9a9aa2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    overflow: hidden;
  }
  #app { position: relative; height: 100vh; overflow: hidden; }

  /* Top bar (overlays the viewer; hiding it does not change viewer's size) */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; row-gap: 6px;
    padding: 10px 12px; background: rgba(20,20,24,0.55);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    border-bottom: 1px solid #2a2a30;
    transition: transform 0.25s ease, opacity 0.25s ease;
    z-index: 10;
  }
  #topbar.hidden { transform: translateY(-100%); opacity: 0; }
  .ctrlBtn, .primaryBtn {
    padding: 8px 14px; border-radius: 6px; border: none;
    font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  .primaryBtn { background: var(--accent); color: white; }
  .ctrlBtn { background: #2a2a30; color: var(--text); }
  .ctrlBtn.active { background: var(--accent); color: white; }
  .ctrlBtn:hover, .primaryBtn:hover { filter: brightness(1.15); }
  .ctrlBtn:disabled, .primaryBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 12px; color: var(--sub); min-width: 90px; }
  #currentTitle {
    font-size: 13px; font-weight: 600; color: var(--text);
    max-width: 40vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Viewer: always fills the full app area. Topbar/controls float on top of
     it, so hiding them reveals more of the image instead of leaving blank
     space behind. */
  #viewer {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: #000; overflow: auto;
  }
  #imgWrap { position: relative; width: 100%; height: 100%; }
  #pageStage { position: absolute; inset: 0; overflow: hidden; }
  .pageSlide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    will-change: transform;
  }
  .pageimg { display: block; }

  .clickzone { position: absolute; top: 0; bottom: 0; cursor: pointer; }
  .clickzone.left { left: 0; width: 38%; }
  .clickzone.right { right: 0; width: 38%; }
  .clickzone.mid { left: 38%; width: 24%; cursor: default; }

  #placeholder {
    color: var(--sub); font-size: 15px; text-align: center; padding: 20px;
    line-height: 1.8;
  }
  #placeholder code { background: #1a1a1e; padding: 2px 6px; border-radius: 4px; }

  #spinner {
    display: none; width: 36px; height: 36px;
    border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Bottom controls (also overlays the viewer; see #topbar comment above) */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; row-gap: 6px;
    padding: 10px 14px; background: rgba(20,20,24,0.55);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    border-top: 1px solid #2a2a30;
    transition: transform 0.25s ease, opacity 0.25s ease;
    z-index: 10;
  }
  #controls.hidden { transform: translateY(100%); opacity: 0; }
  #pageSlider { flex: 1; min-width: 80px; }
  #pageLabel { font-size: 13px; color: var(--sub); min-width: 70px; text-align: center; white-space: nowrap; }

  /* Modal overlays (shared) */
  .modalOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .modalOverlay.show { display: flex; }
  .modalPanel {
    background: var(--panel); border-radius: 10px; width: min(520px, 90vw);
    max-height: 80vh; display: flex; flex-direction: column; padding: 14px;
  }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; font-size: 15px;
  }

  /* Save dialog */
  .field-label { font-size: 12px; color: var(--sub); display: block; margin-top: 10px; }
  #saveDialogPanel input[type="text"], #saveDialogPanel select,
  #customAddPanel input[type="text"], #customAddPanel select {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #333;
    background: #0e0e10; color: var(--text); font-size: 16px; margin-top: 4px;
  }
  #customAddPanel textarea {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #333;
    background: #0e0e10; color: var(--text); font-size: 14px; margin-top: 4px;
    font-family: inherit; resize: vertical;
  }
  #newFolderRow, #customNewFolderRow { display: none; gap: 8px; margin-top: 8px; }
  #newFolderRow input, #customNewFolderRow input { flex: 1; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* Saved list */
  #listToolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #listFolderTitle { flex: 1; font-size: 14px; font-weight: bold; }
  #listNewFolderRow { display: none; gap: 8px; margin-bottom: 10px; }
  #listNewFolderRow input {
    flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid #333;
    background: #0e0e10; color: var(--text); font-size: 16px;
  }
  #savedListItems { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .saved-item {
    display: flex; align-items: center; gap: 8px;
    background: #0e0e10; border: 1px solid #2a2a30; border-radius: 6px; padding: 8px 10px;
  }
  .saved-item .url-text, .saved-item .item-text {
    flex: 1; overflow: hidden; cursor: pointer; min-width: 0;
  }
  .folder-name { font-size: 14px; font-weight: bold; }
  .saved-item .item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved-item .item-url { font-size: 11px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved-item .url-text:hover, .saved-item .item-text:hover .item-title { color: var(--accent); }
  .chevron { color: var(--sub); font-size: 16px; }
  .saved-item button {
    background: #2a2a30; border: none; color: var(--text); border-radius: 4px;
    padding: 4px 8px; cursor: pointer; font-size: 12px; white-space: nowrap; flex-shrink: 0;
  }
  #savedListEmpty { color: var(--sub); font-size: 13px; text-align: center; padding: 24px 0; }

  /* Bookshelf grid: shown inside a folder, like a Kindle library — page-1
     cover thumbnails lined up instead of plain text rows. */
  #savedListItems.bookshelf {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap: 16px 10px; align-items: start;
  }
  .book-card { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
  .book-cover {
    position: relative; width: 100%; aspect-ratio: 2 / 3; background: #0e0e10;
    border: 1px solid #2a2a30; border-radius: 4px; overflow: hidden;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
  }
  .book-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .book-title {
    font-size: 11px; color: var(--text); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .book-delBtn {
    position: absolute; top: 3px; right: 3px; width: 20px; height: 20px; line-height: 18px;
    text-align: center; border-radius: 50%; background: rgba(20,20,24,0.85); color: var(--text);
    border: none; font-size: 13px; cursor: pointer; padding: 0;
  }

  /* Export/import */
  #exportImportRow {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 0; margin-bottom: 6px; border-bottom: 1px solid #2a2a30;
    font-size: 12px;
  }


  /* Access lock */
  #lockOverlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  #lockPanel {
    background: var(--panel); border-radius: 10px; padding: 26px;
    width: min(300px, 86vw); text-align: center;
  }
  #lockPanel p { margin: 0 0 14px; font-size: 14px; color: var(--text); }
  #lockInput {
    width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333;
    background: #0e0e10; color: var(--text); font-size: 18px; text-align: center;
    letter-spacing: 6px; margin-bottom: 10px;
  }
  #lockError { color: var(--accent); font-size: 12px; min-height: 16px; margin-bottom: 8px; }
  #lockSubmitBtn { width: 100%; }
</style>
</head>
<body>
<div id="lockOverlay">
  <div id="lockPanel">
    <p>パスコードを入力してください</p>
    <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
    <div id="lockError"></div>
    <button class="primaryBtn" id="lockSubmitBtn">進む</button>
  </div>
</div>
<div id="app">
  <div id="topbar">
    <button class="primaryBtn" id="newBtn">新規</button>
    <button class="ctrlBtn" id="saveBtn" title="今のURLを保存">URLを保存</button>
    <button class="ctrlBtn" id="listBtn" title="保存したURLの一覧">リスト</button>
    <span id="status"></span>
    <span id="currentTitle"></span>
  </div>

  <div id="viewer" class="fit-contain">
    <div id="placeholder">
      「新規」ボタンを押して、画像が並んでいるURLを入力してください<br>
      例: <code>https://example.com/manga/test/</code> でも <code>https://example.com/manga/test/1.jpg</code> でもOK<br>
      （<code>1.jpg</code>, <code>2.jpg</code> ... のように連番で並んでいる場所）
    </div>
    <div id="spinner"></div>
    <div id="imgWrap" style="display:none;">
      <div id="pageStage"></div>
      <div class="clickzone left" id="zoneLeft" title="前のページ"></div>
      <div class="clickzone mid" id="zoneMid" title="表示/操作バーの切替"></div>
      <div class="clickzone right" id="zoneRight" title="次のページ"></div>
    </div>
  </div>

  <div id="controls" style="display:none;">
    <button class="ctrlBtn" id="firstBtn" title="最初のページ">|◀</button>
    <button class="ctrlBtn" id="prevBtn" title="前のページ (←)">◀</button>
    <input type="range" id="pageSlider" min="1" max="1" value="1">
    <span id="pageLabel">1 / 1</span>
    <button class="ctrlBtn" id="nextBtn" title="次のページ (→)">▶</button>
    <button class="ctrlBtn" id="lastBtn" title="最後のページ">▶|</button>
    <button class="ctrlBtn active" id="animBtn" title="ページ送りアニメーションの切替">アニメ</button>
  </div>
</div>

<!-- Save dialog -->
<div id="saveDialogOverlay" class="modalOverlay">
  <div id="saveDialogPanel" class="modalPanel">
    <div class="panel-header"><span>URLを保存</span></div>
    <label class="field-label" for="saveTitleInput">タイトル</label>
    <input id="saveTitleInput" type="text" placeholder="例: ○○ 第1巻">
    <label class="field-label" for="saveFolderSelect">フォルダ</label>
    <select id="saveFolderSelect"></select>
    <div id="newFolderRow">
      <input id="newFolderInput" type="text" placeholder="新しいフォルダ名">
      <button class="ctrlBtn" id="confirmNewFolderBtn">追加</button>
    </div>
    <div class="dialog-actions">
      <button class="ctrlBtn" id="cancelSaveBtn">キャンセル</button>
      <button class="primaryBtn" id="confirmSaveBtn">保存</button>
    </div>
  </div>
</div>

<!-- Custom (explicit page-list) manga add dialog -->
<div id="customAddOverlay" class="modalOverlay">
  <div id="customAddPanel" class="modalPanel">
    <div class="panel-header"><span>個別URL漫画を追加</span></div>
    <label class="field-label" for="customTitleInput">タイトル</label>
    <input id="customTitleInput" type="text" placeholder="例: ○○ 第1巻">
    <label class="field-label" for="customFolderSelect">フォルダ</label>
    <select id="customFolderSelect"></select>
    <div id="customNewFolderRow">
      <input id="customNewFolderInput" type="text" placeholder="新しいフォルダ名">
      <button class="ctrlBtn" id="customConfirmNewFolderBtn">追加</button>
    </div>
    <label class="field-label" for="customPagesTextarea">ページURL（1行に1つ、読む順に貼り付け）</label>
    <textarea id="customPagesTextarea" rows="6" placeholder="https://example.com/a/page1.jpg
https://example.com/b/p2.png
https://cdn.example.org/c/003.webp"></textarea>
    <div class="dialog-actions">
      <button class="ctrlBtn" id="cancelCustomAddBtn">キャンセル</button>
      <button class="primaryBtn" id="confirmCustomAddBtn">追加</button>
    </div>
  </div>
</div>

<!-- Saved list -->
<div id="savedListOverlay" class="modalOverlay">
  <div id="savedListPanel" class="modalPanel">
    <div class="panel-header">
      <span>保存したURL</span>
      <button class="ctrlBtn" id="closeListBtn">閉じる</button>
    </div>
    <div id="exportImportRow">
      <button class="ctrlBtn" id="exportBtn">書き出し(JSON)</button>
      <button class="ctrlBtn" id="importBtn">読み込み(JSON)</button>
      <input type="file" id="importFileInput" accept="application/json" style="display:none;">
      <button class="ctrlBtn" id="addCustomBtn">個別URL漫画を追加</button>
    </div>
    <div id="listToolbar">
      <button class="ctrlBtn" id="listBackBtn" style="display:none;">← 戻る</button>
      <span id="listFolderTitle"></span>
      <button class="ctrlBtn" id="feedBtn" style="display:none;">一覧</button>
      <button class="ctrlBtn" id="listNewFolderBtn">+ 新しいフォルダ</button>
    </div>
    <div id="listNewFolderRow">
      <input id="listNewFolderInput" type="text" placeholder="新しいフォルダ名">
      <button class="ctrlBtn" id="listNewFolderConfirmBtn">追加</button>
    </div>
    <div id="savedListItems"></div>
    <div id="savedListEmpty" style="display:none;">保存されたURLはまだありません</div>
  </div>
</div>

<script>
(function () {
  const EXT_CANDIDATES = ['jpg', 'jpeg', 'png', 'webp'];
  const MAX_PAGES_SAFETY = 2000;
  const LOAD_TIMEOUT_MS = 8000;
  const ANIM_DURATION = 280; // ms

  const LAST_URL_KEY = 'mangaReaderLastUrl';
  const LAST_PAGE_KEY = 'mangaReaderLastPage';
  const ANIM_KEY = 'mangaReaderAnimEnabled';
  const SAVED_FOLDERS_KEY = 'mangaReaderSavedFolders';
  const SAVED_ITEMS_KEY = 'mangaReaderSavedItems';
  const LEGACY_SAVED_URLS_KEY = 'mangaReaderSavedUrls';
  const HISTORY_FOLDER_ID = '__history__';
  const HISTORY_FOLDER_NAME = '履歴';

  const els = {
    newBtn: document.getElementById('newBtn'),
    saveBtn: document.getElementById('saveBtn'),
    listBtn: document.getElementById('listBtn'),
    status: document.getElementById('status'),
    currentTitle: document.getElementById('currentTitle'),
    viewer: document.getElementById('viewer'),
    placeholder: document.getElementById('placeholder'),
    spinner: document.getElementById('spinner'),
    imgWrap: document.getElementById('imgWrap'),
    pageStage: document.getElementById('pageStage'),
    zoneLeft: document.getElementById('zoneLeft'),
    zoneRight: document.getElementById('zoneRight'),
    zoneMid: document.getElementById('zoneMid'),
    controls: document.getElementById('controls'),
    topbar: document.getElementById('topbar'),
    firstBtn: document.getElementById('firstBtn'),
    nextBtn: document.getElementById('nextBtn'),
    prevBtn: document.getElementById('prevBtn'),
    lastBtn: document.getElementById('lastBtn'),
    animBtn: document.getElementById('animBtn'),
    pageSlider: document.getElementById('pageSlider'),
    pageLabel: document.getElementById('pageLabel'),

    saveDialogOverlay: document.getElementById('saveDialogOverlay'),
    saveTitleInput: document.getElementById('saveTitleInput'),
    saveFolderSelect: document.getElementById('saveFolderSelect'),
    newFolderRow: document.getElementById('newFolderRow'),
    newFolderInput: document.getElementById('newFolderInput'),
    confirmNewFolderBtn: document.getElementById('confirmNewFolderBtn'),
    cancelSaveBtn: document.getElementById('cancelSaveBtn'),
    confirmSaveBtn: document.getElementById('confirmSaveBtn'),

    savedListOverlay: document.getElementById('savedListOverlay'),
    listBackBtn: document.getElementById('listBackBtn'),
    listFolderTitle: document.getElementById('listFolderTitle'),
    listNewFolderBtn: document.getElementById('listNewFolderBtn'),
    listNewFolderRow: document.getElementById('listNewFolderRow'),
    listNewFolderInput: document.getElementById('listNewFolderInput'),
    listNewFolderConfirmBtn: document.getElementById('listNewFolderConfirmBtn'),
    savedListItems: document.getElementById('savedListItems'),
    savedListEmpty: document.getElementById('savedListEmpty'),
    closeListBtn: document.getElementById('closeListBtn'),
    feedBtn: document.getElementById('feedBtn'),

    exportBtn: document.getElementById('exportBtn'),
    importBtn: document.getElementById('importBtn'),
    importFileInput: document.getElementById('importFileInput'),
    addCustomBtn: document.getElementById('addCustomBtn'),

    customAddOverlay: document.getElementById('customAddOverlay'),
    customTitleInput: document.getElementById('customTitleInput'),
    customFolderSelect: document.getElementById('customFolderSelect'),
    customNewFolderRow: document.getElementById('customNewFolderRow'),
    customNewFolderInput: document.getElementById('customNewFolderInput'),
    customConfirmNewFolderBtn: document.getElementById('customConfirmNewFolderBtn'),
    customPagesTextarea: document.getElementById('customPagesTextarea'),
    cancelCustomAddBtn: document.getElementById('cancelCustomAddBtn'),
    confirmCustomAddBtn: document.getElementById('confirmCustomAddBtn'),

    lockOverlay: document.getElementById('lockOverlay'),
    lockInput: document.getElementById('lockInput'),
    lockError: document.getElementById('lockError'),
    lockSubmitBtn: document.getElementById('lockSubmitBtn'),
  };

  let baseUrl = '';
  let pages = [];          // detected page URLs, index 0 = page 1
  let preferredExt = 0;    // index into EXT_CANDIDATES
  // Key used to look up/save resume-page position in LAST_PAGE_KEY. For a
  // normal 連番ベースURL manga this is just baseUrl; for a "custom" manga
  // (explicit non-sequential page list, see startReadingCustom) there's no
  // baseUrl, so a synthetic 'custom:<itemId>' key is used instead.
  let currentResumeKey = '';
  let currentlyCustom = false; // true while a custom (fixed page list) manga is open
  let detecting = false;
  let detectionDone = false;
  let detectionHitLimit = false;
  let currentPage = 1;
  let pendingResumePage = null;
  let latestRenderId = 0; // guards against a slow-loading page overwriting a newer one
  let readingGeneration = 0; // guards against an old detection loop polluting a newer manga's page list

  // Vertical-swipe-in-reader context: when a manga is opened from a folder's
  // list or the 一覧 feed, this remembers that folder's item order so the
  // reader itself can be swiped up/down to jump straight to the next/previous
  // manga without backing out to the list first. Opening via 新規 or the
  // page-load auto-resume has no list context, so swiping does nothing then.
  let readingListItems = [];
  let readingListIndex = -1;
  const preloadedCoverUrls = new Set(); // dedup: avoid re-fetching the same manga's page 1 repeatedly
  function setReadingListContext(items, index) {
    readingListItems = items;
    readingListIndex = index;
    preloadAdjacentManga();
  }
  // Preloads page 1 of the manga just above/below the current position in
  // readingListItems, so swiping up/down shows it instantly instead of
  // waiting for a network fetch. Cheap to call repeatedly; already-preloaded
  // URLs are skipped via preloadedCoverUrls.
  function preloadAdjacentManga() {
    [readingListIndex - 1, readingListIndex + 1].forEach((idx) => {
      if (idx < 0 || idx >= readingListItems.length) return;
      const item = readingListItems[idx];
      if (!item) return;
      const isCustom = Array.isArray(item.pages) && item.pages.length;
      const firstPageUrl = isCustom ? item.pages[0] : item.url;
      if (!firstPageUrl || preloadedCoverUrls.has(firstPageUrl)) return;
      preloadedCoverUrls.add(firstPageUrl);
      if (isCustom) {
        const img = new Image(); // exact URL already known; no extension cascade needed
        img.src = firstPageUrl;
      } else {
        preloadFirstPage(firstPageUrl);
      }
    });
  }
  function clearReadingListContext() { readingListItems = []; readingListIndex = -1; }

  let fitModes = ['fit-contain', 'fit-width', 'fit-height'];
  let fitLabels = { 'fit-contain': '表示:全体', 'fit-width': '表示:幅優先', 'fit-height': '表示:高さ優先' };
  let fitIndex = 0;

  let animEnabled = true;

  let savedFolders = []; // [{id, name}]
  // [{id, url, title, folderId, addedAt}] for normal 連番ベースURL manga, or
  // [{id, pages: [url, url, ...], title, folderId, addedAt}] (no `url`) for
  // a "custom" manga added via 個別URL漫画を追加 — see
  // confirmCustomAdd / openItem / startReadingCustom.
  let savedItems = [];
  let currentFolderView = null;
  let pendingSaveUrl = null;

  function genId(prefix) {
    return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ---------- persistence ----------
  try {
    const a = localStorage.getItem(ANIM_KEY);
    if (a !== null) animEnabled = a === '1';
  } catch (e) {}
  els.animBtn.classList.toggle('active', animEnabled);

  function persistAnim() { try { localStorage.setItem(ANIM_KEY, animEnabled ? '1' : '0'); } catch (e) {} }
  function persistFolders() { try { localStorage.setItem(SAVED_FOLDERS_KEY, JSON.stringify(savedFolders)); } catch (e) {} }
  function persistItems() { try { localStorage.setItem(SAVED_ITEMS_KEY, JSON.stringify(savedItems)); } catch (e) {} }
  function persistAll() {
    persistFolders();
    persistItems();
  }

  // Remembers the last page viewed per manga (keyed by baseUrl). If the last
  // viewed page was the final page (and detection had finished, so we know it
  // really was the end), resuming should restart from page 1 instead.
  function persistLastPage() {
    if (!currentResumeKey || !pages.length) return;
    try {
      const map = JSON.parse(localStorage.getItem(LAST_PAGE_KEY) || '{}');
      map[currentResumeKey] = {
        page: currentPage,
        wasLast: detectionDone && currentPage === pages.length,
        savedAt: Date.now(),
      };
      localStorage.setItem(LAST_PAGE_KEY, JSON.stringify(map));
    } catch (e) {}
  }

  function getResumePage(url) {
    try {
      const map = JSON.parse(localStorage.getItem(LAST_PAGE_KEY) || '{}');
      const rec = map[url];
      if (rec && !rec.wasLast && rec.page > 1) return rec.page;
    } catch (e) {}
    return null;
  }

  function exportData() {
    const data = { folders: savedFolders, items: savedItems };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'manga_reader_urls.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function importDataFromFile(file) {
    file.text().then((text) => {
      let data;
      try { data = JSON.parse(text); } catch (e) { flashStatus('ファイル形式が正しくありません'); return; }
      if (!data || !Array.isArray(data.folders) || !Array.isArray(data.items)) {
        flashStatus('ファイル形式が正しくありません');
        return;
      }
      if (!confirm('読み込んだ内容でローカルのリストを置き換えます。よろしいですか？')) return;
      savedFolders = data.folders;
      savedItems = data.items;
      persistFolders();
      persistItems();
      if (isSavedListOpen()) renderSavedList();
      flashStatus('読み込みました');
    }).catch(() => flashStatus('読み込みに失敗しました'));
  }

  // Normalizes a base URL for identity comparisons: scheme (http/https) and
  // host case differences shouldn't make two saves count as "different".
  function baseUrlKey(url) {
    try {
      const u = new URL(url);
      return u.hostname.toLowerCase() + u.pathname;
    } catch (e) {
      return (url || '').trim().replace(/^https?:\/\//i, '').toLowerCase();
    }
  }

  // The "履歴" folder is a reserved, always-present folder that auto-collects
  // every manga opened via the "新規" button. Created on first use.
  function ensureHistoryFolder() {
    if (!savedFolders.some((f) => f.id === HISTORY_FOLDER_ID)) {
      savedFolders.unshift({ id: HISTORY_FOLDER_ID, name: HISTORY_FOLDER_NAME });
    }
  }

  // Auto-adds a newly opened manga to 履歴 (no title prompt: title is derived
  // from the URL). Re-opening the same manga moves its history entry to the
  // top instead of piling up duplicates.
  function addToHistory(url) {
    ensureHistoryFolder();
    savedItems = savedItems.filter((it) => !(it.folderId === HISTORY_FOLDER_ID && baseUrlKey(it.url) === baseUrlKey(url)));
    savedItems.unshift({
      id: genId('i'),
      url: url,
      title: deriveTitleFromUrl(url),
      folderId: HISTORY_FOLDER_ID,
      addedAt: Date.now(),
    });
    persistAll();
    updateCurrentTitleDisplay();
  }

  // If the URL currently being viewed matches a saved item (by base URL),
  // show that item's title in the header; otherwise clear it.
  function updateCurrentTitleDisplay() {
    // Custom items (explicit page list) set their own title directly in
    // startReadingCustom; baseUrl is empty for them, so don't let this
    // baseUrl-keyed lookup clear it (e.g. when an unrelated item is deleted
    // from the saved list while a custom manga is on screen).
    if (currentlyCustom) return;
    if (!baseUrl) { els.currentTitle.textContent = ''; return; }
    const match = savedItems.find((it) => baseUrlKey(it.url) === baseUrlKey(baseUrl));
    els.currentTitle.textContent = match ? match.title : '';
  }

  function deriveTitleFromUrl(url) {
    try {
      const u = new URL(url);
      const path = u.pathname.replace(/\/+$/, '');
      const seg = path.split('/').filter(Boolean).pop();
      return seg ? decodeURIComponent(seg) : u.hostname;
    } catch (e) { return url; }
  }

  function loadSaved() {
    try { savedFolders = JSON.parse(localStorage.getItem(SAVED_FOLDERS_KEY) || '[]'); }
    catch (e) { savedFolders = []; }
    try { savedItems = JSON.parse(localStorage.getItem(SAVED_ITEMS_KEY) || '[]'); }
    catch (e) { savedItems = []; }

    // migrate from the older flat URL-list format if present and nothing migrated yet
    if (savedItems.length === 0) {
      try {
        const legacy = JSON.parse(localStorage.getItem(LEGACY_SAVED_URLS_KEY) || '[]');
        if (Array.isArray(legacy) && legacy.length) {
          savedItems = legacy.map((it) => ({
            id: genId('i'),
            url: it.url,
            title: deriveTitleFromUrl(it.url),
            folderId: null,
            addedAt: it.addedAt || Date.now(),
          }));
          persistItems();
        }
      } catch (e) {}
    }
    ensureHistoryFolder();
  }
  loadSaved();

  // ---------- URL parsing ----------
  // Accepts either a folder URL ("https://example.com/manga/test/") or a direct
  // link to a numbered page ("https://example.com/manga/test/1.jpg") and returns
  // the normalized folder URL (always ending in "/") plus an extension hint.
  function parseInputUrl(input) {
    let v = (input || '').trim();
    if (!v) return null;
    if (!/^https?:\/\//i.test(v)) v = 'https://' + v;
    let hintExt = null;
    const m = v.match(/^(.*\/)\d+\.([A-Za-z0-9]+)(?:[?#].*)?$/);
    if (m) {
      v = m[1];
      const idx = EXT_CANDIDATES.indexOf(m[2].toLowerCase());
      if (idx !== -1) hintExt = idx;
    } else {
      // strip any query/hash if the user pasted a folder URL with one
      v = v.replace(/[?#].*$/, '');
    }
    if (!v.endsWith('/')) v += '/';
    return { baseUrl: v, hintExt: hintExt };
  }

  // ---------- image loading / detection ----------
  function loadImage(url) {
    return new Promise((resolve) => {
      const img = new Image();
      let done = false;
      const timer = setTimeout(() => {
        if (!done) { done = true; resolve(false); }
      }, LOAD_TIMEOUT_MS);
      img.onload = () => { if (!done) { done = true; clearTimeout(timer); resolve(true); } };
      img.onerror = () => { if (!done) { done = true; clearTimeout(timer); resolve(false); } };
      img.src = url;
    });
  }

  async function findPageUrl(pageNum) {
    const order = [preferredExt, ...EXT_CANDIDATES.map((_, i) => i).filter((i) => i !== preferredExt)];
    for (const idx of order) {
      const ext = EXT_CANDIDATES[idx];
      const url = baseUrl + pageNum + '.' + ext;
      const ok = await loadImage(url);
      if (ok) { preferredExt = idx; return url; }
    }
    return null;
  }

  // Preloads just page 1 of another manga (used for swipe-list neighbors).
  // Doesn't know the right extension ahead of time, so it cascades through
  // EXT_CANDIDATES like findPageUrl, but fire-and-forget: a successful
  // loadImage() call leaves the browser's image cache primed, so the actual
  // <img> shown later by startReading()/renderPage() loads instantly.
  async function preloadFirstPage(baseUrlForItem) {
    for (const ext of EXT_CANDIDATES) {
      const ok = await loadImage(baseUrlForItem + '1.' + ext);
      if (ok) return;
    }
  }

  // url: the manga's folder/page URL. addToHistoryFlag: true when this open
  // should be auto-recorded into 履歴 (used for the "新規" button only).
  // switchDirection ('up'/'down') means this call was triggered by a
  // vertical swipe inside the reader (see goToReadingListOffset). In that
  // case we keep the outgoing manga's page on screen instead of blanking to
  // a spinner, so renderPage can do a real vertical slide once the new
  // manga's first page is ready — that's what makes the swipe feel live
  // instead of an instant cut.
  async function startReading(url, addToHistoryFlag, switchDirection) {
    const parsed = parseInputUrl(url);
    if (!parsed) return;
    // Each call gets its own "generation" number. If a newer startReading()
    // call comes in before this one finishes (e.g. the user opens another
    // manga, or re-opens one from 履歴/list, while the previous one is still
    // detecting pages in the background), the stale call's still-pending
    // findPageUrl()/detectMorePages() work must not be allowed to keep
    // pushing into the shared `pages` array — that's what was causing pages
    // to occasionally show up twice. Every await below is followed by a
    // check that this call is still the current generation.
    const myGeneration = ++readingGeneration;
    baseUrl = parsed.baseUrl;
    currentResumeKey = baseUrl;
    currentlyCustom = false;
    preferredExt = parsed.hintExt !== null ? parsed.hintExt : 0;
    try { localStorage.setItem(LAST_URL_KEY, JSON.stringify({ kind: 'url', value: baseUrl })); } catch (e) {}
    updateCurrentTitleDisplay();
    if (addToHistoryFlag) addToHistory(baseUrl);

    pages = [];
    detecting = true;
    detectionDone = false;
    detectionHitLimit = false;
    currentPage = 1;
    pendingResumePage = getResumePage(baseUrl);

    els.newBtn.disabled = true;
    if (!switchDirection) {
      // Normal open (新規/list/resume): no prior page to keep showing, so
      // blank to a spinner while page 1 is located, same as always.
      els.placeholder.style.display = 'none';
      els.imgWrap.style.display = 'none';
      els.spinner.style.display = 'block';
    }
    els.status.textContent = '1ページ目を確認中...';

    const firstUrl = await findPageUrl(1);
    if (myGeneration !== readingGeneration) return; // superseded while we were checking page 1
    els.newBtn.disabled = false;

    if (!firstUrl) {
      els.spinner.style.display = 'none';
      els.imgWrap.style.display = 'none';
      els.placeholder.style.display = 'block';
      els.placeholder.innerHTML =
        '1ページ目が見つかりませんでした。<br>' +
        '試したURL: ' + EXT_CANDIDATES.map((e) => '<code>' + baseUrl + '1.' + e + '</code>').join(' / ') + '<br>' +
        'URLや拡張子を確認してください。';
      els.status.textContent = '';
      detecting = false;
      return;
    }

    pages.push(firstUrl);
    els.spinner.style.display = 'none';
    els.imgWrap.style.display = 'block';
    els.controls.style.display = 'flex';
    showPage(1, switchDirection === 'up' ? 'swipeUp' : switchDirection === 'down' ? 'swipeDown' : null);
    updateStatus();
    detectMorePages(2, myGeneration);
  }

  async function detectMorePages(startPage, generation) {
    let pageNum = startPage;
    while (pageNum <= MAX_PAGES_SAFETY) {
      const url = await findPageUrl(pageNum);
      if (generation !== readingGeneration) return; // a newer manga was opened meanwhile; abandon this stale loop
      if (!url) {
        detectionDone = true;
        detecting = false;
        updateStatus();
        updateSlider();
        persistLastPage();
        return;
      }
      pages.push(url);
      pageNum++;
      updateStatus();
      updateSlider();
      if (pendingResumePage !== null && pages.length === pendingResumePage) {
        jumpToPage(pendingResumePage);
        pendingResumePage = null;
      }
    }
    if (generation !== readingGeneration) return;
    detectionHitLimit = true;
    detectionDone = true;
    detecting = false;
    updateStatus();
    updateSlider();
    persistLastPage();
  }

  // Opens a "custom" manga: one whose pages were supplied as an explicit,
  // non-sequential URL list via the 個別URL漫画を追加 dialog (see
  // confirmCustomAdd) rather than a base URL + guessed-extension sequence.
  // All pages are already known up front, so there's no async detection
  // loop — just show the (resume) page immediately. switchDirection mirrors
  // startReading's vertical-swipe handling so swiping into a custom manga
  // animates the same way.
  function startReadingCustom(item, switchDirection) {
    readingGeneration++; // invalidate any still-running sequential detection loop
    baseUrl = '';
    currentResumeKey = 'custom:' + item.id;
    currentlyCustom = true;
    pages = (item.pages || []).slice();
    detecting = false;
    detectionDone = true;
    detectionHitLimit = false;
    currentPage = 1;
    pendingResumePage = getResumePage(currentResumeKey);

    els.currentTitle.textContent = item.title || '無題';
    try { localStorage.setItem(LAST_URL_KEY, JSON.stringify({ kind: 'item', itemId: item.id })); } catch (e) {}

    if (!pages.length) {
      els.spinner.style.display = 'none';
      els.imgWrap.style.display = 'none';
      els.placeholder.style.display = 'block';
      els.placeholder.textContent = 'このアイテムにはページがありません。';
      els.status.textContent = '';
      return;
    }

    if (!switchDirection) {
      els.placeholder.style.display = 'none';
      els.spinner.style.display = 'none';
    }
    els.imgWrap.style.display = 'block';
    els.controls.style.display = 'flex';
    const startPage = pendingResumePage || 1;
    pendingResumePage = null;
    showPage(startPage, switchDirection === 'up' ? 'swipeUp' : switchDirection === 'down' ? 'swipeDown' : null);
    updateStatus();
  }

  // Single entry point for opening a saved item, regardless of whether it's
  // a normal 連番ベースURL manga or a custom (explicit page list) manga
  // added via the 個別URL漫画を追加 dialog. Use this (not startReading
  // directly) for anything that opens an *item* object rather than a raw
  // typed-in URL.
  function openItem(item, addToHistoryFlag, switchDirection) {
    if (item && Array.isArray(item.pages) && item.pages.length) {
      startReadingCustom(item, switchDirection);
    } else {
      startReading(item.url, addToHistoryFlag, switchDirection);
    }
  }

  function updateStatus() {
    if (detecting) {
      els.status.textContent = '検出中... ' + pages.length + 'ページ確認済み';
    } else if (detectionHitLimit) {
      els.status.textContent = pages.length + 'ページ以上（検出上限）';
    } else if (detectionDone) {
      els.status.textContent = '全 ' + pages.length + ' ページ';
    }
  }

  function flashStatus(msg) {
    els.status.textContent = msg;
    setTimeout(updateStatus, 1500);
  }

  // ---------- page rendering / navigation ----------
  function styleImg(img) {
    const mode = fitModes[fitIndex];
    img.style.maxWidth = '100%';
    img.style.maxHeight = '';
    img.style.width = '';
    img.style.height = '';
    img.style.objectFit = '';
    if (mode === 'fit-contain') {
      // Topbar/controls float on top of the viewer (not beside it), so the
      // image can always use the full viewport height; hiding the bars
      // reveals more of the image instead of leaving blank space.
      img.style.maxHeight = '100vh';
      img.style.width = 'auto';
      img.style.height = 'auto';
      img.style.objectFit = 'contain';
    } else if (mode === 'fit-width') {
      img.style.width = '100%';
      img.style.height = 'auto';
    } else { // fit-height
      img.style.height = '100vh';
      img.style.width = 'auto';
    }
  }

  function makeImg(pNum) {
    const img = document.createElement('img');
    img.className = 'pageimg';
    img.alt = 'page ' + pNum;
    img.src = pages[pNum - 1];
    styleImg(img);
    return img;
  }

  // 'next'/'prev' are horizontal page turns within the same manga.
  // 'swipeUp'/'swipeDown' are vertical manga switches (一覧 swipe), entering
  // and exiting along Y instead of X — same crossfade-and-slide mechanism,
  // different axis, so it actually reads as a swipe instead of a hard cut.
  const DIR_TRANSFORMS = {
    next:      { enter: 'translateX(100%)',  exit: 'translateX(-100%)' },
    prev:      { enter: 'translateX(-100%)', exit: 'translateX(100%)' },
    swipeUp:   { enter: 'translateY(100%)',  exit: 'translateY(-100%)' },
    swipeDown: { enter: 'translateY(-100%)', exit: 'translateY(100%)' },
  };

  // Renders page n into the stage, but only once its image has actually
  // finished loading. Until then, whatever was previously on screen stays
  // visible instead of being replaced by a blank/black frame. If the page
  // changes again before this one finishes loading, the stale result is
  // dropped (latestRenderId guard) so a slow load can't clobber a newer page.
  function renderPage(n, direction) {
    const myId = ++latestRenderId;
    const img = makeImg(n);

    const doRender = () => {
      if (myId !== latestRenderId) return;

      const newSlide = document.createElement('div');
      newSlide.className = 'pageSlide';
      newSlide.appendChild(img);

      const prevSlide = els.pageStage.querySelector('.pageSlide.current');
      const t = direction && DIR_TRANSFORMS[direction];

      if (animEnabled && t && prevSlide) {
        newSlide.style.transform = t.enter;
        els.pageStage.appendChild(newSlide);
        prevSlide.classList.remove('current');
        void newSlide.offsetWidth; // force layout before animating
        newSlide.style.transition = 'transform ' + ANIM_DURATION + 'ms ease';
        prevSlide.style.transition = 'transform ' + ANIM_DURATION + 'ms ease';
        requestAnimationFrame(() => {
          newSlide.style.transform = 'translate(0, 0)';
          prevSlide.style.transform = t.exit;
        });
        newSlide.classList.add('current');
        setTimeout(() => { if (prevSlide.parentNode) prevSlide.parentNode.removeChild(prevSlide); }, ANIM_DURATION + 60);
      } else {
        els.pageStage.innerHTML = '';
        newSlide.classList.add('current');
        els.pageStage.appendChild(newSlide);
      }
    };

    if (img.complete) {
      doRender();
    } else {
      img.addEventListener('load', doRender, { once: true });
      img.addEventListener('error', doRender, { once: true });
    }
  }

  function updateSlider() {
    els.pageSlider.max = Math.max(pages.length, currentPage);
    els.pageSlider.value = currentPage;
    const totalLabel = detectionDone ? pages.length : pages.length + '+';
    els.pageLabel.textContent = currentPage + ' / ' + totalLabel;
  }

  function preload(pageNum) {
    if (pageNum >= 1 && pageNum <= pages.length) {
      const img = new Image();
      img.src = pages[pageNum - 1];
    }
  }

  function showPage(n, forceDirection) {
    if (!pages.length) return;
    if (n < 1) n = 1;
    if (n > pages.length) n = pages.length;
    const hasCurrent = !!els.pageStage.querySelector('.pageSlide');
    const direction = forceDirection || (!hasCurrent ? null : (n > currentPage ? 'next' : (n < currentPage ? 'prev' : null)));
    currentPage = n;
    renderPage(n, direction);
    updateSlider();
    for (let i = 1; i <= 5; i++) preload(n + i);
    preload(n - 1);
    persistLastPage();
  }

  // Instant, non-animated jump used when resuming to a saved page on load.
  function jumpToPage(n) {
    if (!pages.length) return;
    if (n < 1) n = 1;
    if (n > pages.length) n = pages.length;
    currentPage = n;
    renderPage(n, null);
    updateSlider();
    for (let i = 1; i <= 5; i++) preload(n + i);
    preload(n - 1);
    persistLastPage();
  }

  function nextPage() { if (currentPage < pages.length) showPage(currentPage + 1); }
  function prevPage() { if (currentPage > 1) showPage(currentPage - 1); }
  function goFirst() { showPage(1); }
  function goLast() { showPage(pages.length); }

  function refreshCurrentView() {
    if (pages.length) renderPage(currentPage, null);
  }

  function toggleBars() {
    els.topbar.classList.toggle('hidden');
    els.controls.classList.toggle('hidden');
  }

  function toggleAnim() {
    animEnabled = !animEnabled;
    els.animBtn.classList.toggle('active', animEnabled);
    persistAnim();
  }

  // ---------- vertical swipe in reader: jump to next/prev manga in list ----------
  function goToReadingListOffset(offset) {
    if (!readingListItems.length) return; // opened without folder/feed context; nothing to swipe to
    const newIndex = readingListIndex + offset;
    if (newIndex < 0 || newIndex >= readingListItems.length) {
      flashStatus(offset > 0 ? 'これが最後の作品です' : 'これが最初の作品です');
      return;
    }
    readingListIndex = newIndex;
    preloadAdjacentManga();
    const item = readingListItems[newIndex];
    // offset > 0 (swiped up, moving to the next item) slides the new page in
    // from the bottom; offset < 0 (swiped down, previous item) from the top.
    // openItem dispatches to startReading or startReadingCustom depending on
    // whether this item has a fixed (explicit page-list) page list.
    openItem(item, false, offset > 0 ? 'up' : 'down');
  }

  let touchStartX = 0, touchStartY = 0, touchActive = false;
  const VERTICAL_SWIPE_THRESHOLD = 60; // px
  function onReaderTouchStart(e) {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchActive = true;
  }
  function onReaderTouchMove(e) {
    if (!touchActive || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    // Once the gesture is clearly a vertical drag, stop the page from doing
    // anything else with it (e.g. bounce-scroll) so it reads as a clean swipe.
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) e.preventDefault();
  }
  function onReaderTouchEnd(e) {
    if (!touchActive) return;
    touchActive = false;
    const touch = e.changedTouches[0];
    if (!touch) return;
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > VERTICAL_SWIPE_THRESHOLD) {
      e.preventDefault(); // a real swipe, not a tap — don't also trigger the page-turn click
      goToReadingListOffset(dy < 0 ? 1 : -1); // swipe up = next manga, down = previous
    }
  }
  els.imgWrap.addEventListener('touchstart', onReaderTouchStart, { passive: true });
  els.imgWrap.addEventListener('touchmove', onReaderTouchMove, { passive: false });
  els.imgWrap.addEventListener('touchend', onReaderTouchEnd, { passive: false });

  // ---------- save dialog ----------
  function renderFolderOptions(selectEl, selectedId) {
    selectEl.innerHTML = '';
    const optNone = document.createElement('option');
    optNone.value = '';
    optNone.textContent = 'フォルダなし';
    selectEl.appendChild(optNone);
    savedFolders.forEach((f) => {
      const o = document.createElement('option');
      o.value = f.id;
      o.textContent = f.name;
      selectEl.appendChild(o);
    });
    const optNew = document.createElement('option');
    optNew.value = '__new__';
    optNew.textContent = '+ 新しいフォルダを作成';
    selectEl.appendChild(optNew);
    selectEl.value = selectedId || '';
  }

  function openSaveDialog() {
    if (!baseUrl) { flashStatus('表示中の作品がありません'); return; }
    pendingSaveUrl = baseUrl;
    els.saveTitleInput.value = deriveTitleFromUrl(pendingSaveUrl);
    renderFolderOptions(els.saveFolderSelect, '');
    els.newFolderRow.style.display = 'none';
    els.newFolderInput.value = '';
    els.saveDialogOverlay.classList.add('show');
    els.saveTitleInput.focus();
  }
  function closeSaveDialog() {
    els.saveDialogOverlay.classList.remove('show');
    pendingSaveUrl = null;
  }
  function isSaveDialogOpen() { return els.saveDialogOverlay.classList.contains('show'); }

  function confirmSave() {
    if (!pendingSaveUrl) { closeSaveDialog(); return; }
    let folderId = els.saveFolderSelect.value;
    if (folderId === '__new__') folderId = '';
    // 履歴 entries don't count as "already saved" — every 新規-opened manga is
    // auto-recorded there, but that shouldn't block the user from also saving
    // it into a real folder. Only block if it's already saved somewhere else.
    const alreadySavedElsewhere = savedItems.some(
      (it) => it.folderId !== HISTORY_FOLDER_ID && baseUrlKey(it.url) === baseUrlKey(pendingSaveUrl)
    );
    if (alreadySavedElsewhere) {
      flashStatus('既に保存済みです');
      closeSaveDialog();
      return;
    }
    const title = els.saveTitleInput.value.trim() || deriveTitleFromUrl(pendingSaveUrl);
    savedItems.unshift({
      id: genId('i'),
      url: pendingSaveUrl,
      title: title,
      folderId: folderId || null,
      addedAt: Date.now(),
    });
    persistAll();
    updateCurrentTitleDisplay();
    closeSaveDialog();
    flashStatus('保存しました');
  }

  // ---------- custom (explicit page-list) manga add dialog ----------
  // Lets the user add a manga whose pages aren't sequentially-numbered files
  // under one base URL — each page gets its own arbitrary URL, pasted one
  // per line, in reading order. Added directly to savedItems (no JSON
  // file involved); see openItem/startReadingCustom for how it's read back.
  function openCustomAddDialog() {
    els.customTitleInput.value = '';
    renderFolderOptions(els.customFolderSelect, '');
    els.customNewFolderRow.style.display = 'none';
    els.customNewFolderInput.value = '';
    els.customPagesTextarea.value = '';
    els.customAddOverlay.classList.add('show');
    els.customTitleInput.focus();
  }
  function closeCustomAddDialog() {
    els.customAddOverlay.classList.remove('show');
  }
  function isCustomAddDialogOpen() { return els.customAddOverlay.classList.contains('show'); }

  function confirmCustomAdd() {
    const pageUrls = els.customPagesTextarea.value
      .split('\n')
      .map((s) => s.trim())
      .filter(Boolean);
    if (!pageUrls.length) { flashStatus('ページURLを1つ以上入力してください'); return; }
    let folderId = els.customFolderSelect.value;
    if (folderId === '__new__') folderId = '';
    const title = els.customTitleInput.value.trim() || ('無題' + (savedItems.length + 1));
    savedItems.unshift({
      id: genId('i'),
      title: title,
      folderId: folderId || null,
      pages: pageUrls,
      addedAt: Date.now(),
    });
    persistAll();
    closeCustomAddDialog();
    if (isSavedListOpen()) renderSavedList();
    flashStatus(pageUrls.length + 'ページの漫画を追加しました');
  }

  // ---------- saved list (with folders) ----------
  function buildFolderRow(folder) {
    const row = document.createElement('div');
    row.className = 'saved-item folder-row';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'url-text folder-name';
    nameSpan.textContent = folder.name;
    nameSpan.addEventListener('click', () => { currentFolderView = folder.id; renderSavedList(); });

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '›';

    row.appendChild(nameSpan);
    row.appendChild(chevron);

    // 履歴 is a reserved, auto-managed folder and can't be deleted as a whole.
    if (folder.id !== HISTORY_FOLDER_ID) {
      const delBtn = document.createElement('button');
      delBtn.textContent = '削除';
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!confirm('「' + folder.name + '」フォルダと、その中のURLをすべて削除しますか？')) return;
        savedItems = savedItems.filter((it) => it.folderId !== folder.id);
        savedFolders = savedFolders.filter((f) => f.id !== folder.id);
        persistAll();
        renderSavedList();
      });
      row.appendChild(delBtn);
    }
    return row;
  }

  // item.url is undefined for "custom" (explicit page list) items, so
  // title/tooltip fallbacks need to handle that case too.
  function itemDisplayTitle(item) {
    return item.title || (item.url ? deriveTitleFromUrl(item.url) : '無題');
  }
  function itemSubtext(item) {
    if (item.url) return item.url;
    if (Array.isArray(item.pages)) return '個別URL ・ ' + item.pages.length + 'ページ';
    return '';
  }

  function buildItemRow(item, list) {
    const row = document.createElement('div');
    row.className = 'saved-item';

    const textWrap = document.createElement('div');
    textWrap.className = 'item-text';
    textWrap.title = itemSubtext(item);

    const titleEl = document.createElement('div');
    titleEl.className = 'item-title';
    titleEl.textContent = itemDisplayTitle(item);

    const urlEl = document.createElement('div');
    urlEl.className = 'item-url';
    urlEl.textContent = itemSubtext(item);

    textWrap.appendChild(titleEl);
    textWrap.appendChild(urlEl);
    textWrap.addEventListener('click', () => {
      closeSavedList();
      setReadingListContext(list, list.indexOf(item));
      openItem(item, false);
    });

    const delBtn = document.createElement('button');
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      savedItems = savedItems.filter((it) => it.id !== item.id);
      persistAll();
      updateCurrentTitleDisplay();
      renderSavedList();
    });

    row.appendChild(textWrap);
    row.appendChild(delBtn);
    return row;
  }

  // Inside a folder, manga are shown as a Kindle-bookshelf-style grid of
  // page-1 cover thumbnails rather than plain text rows. Reuses the same
  // cascading-extension cover lookup as the 一覧 feed view.
  function buildBookCard(item, list) {
    const card = document.createElement('div');
    card.className = 'book-card';

    const cover = document.createElement('div');
    cover.className = 'book-cover';
    const img = document.createElement('img');
    img.alt = itemDisplayTitle(item);
    if (Array.isArray(item.pages) && item.pages.length) {
      img.src = item.pages[0]; // exact URL already known; no extension cascade needed
    } else {
      setupFeedImage(img, item.url);
    }
    cover.appendChild(img);

    const delBtn = document.createElement('button');
    delBtn.className = 'book-delBtn';
    delBtn.textContent = '×';
    delBtn.title = '削除';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      savedItems = savedItems.filter((it) => it.id !== item.id);
      persistAll();
      updateCurrentTitleDisplay();
      renderSavedList();
    });
    cover.appendChild(delBtn);

    const title = document.createElement('div');
    title.className = 'book-title';
    title.textContent = itemDisplayTitle(item);

    card.appendChild(cover);
    card.appendChild(title);
    card.addEventListener('click', () => {
      closeSavedList();
      setReadingListContext(list, list.indexOf(item));
      openItem(item, false);
    });
    return card;
  }

  function renderSavedList() {
    els.listBackBtn.style.display = currentFolderView ? '' : 'none';
    els.listNewFolderBtn.style.display = currentFolderView ? 'none' : '';
    els.listNewFolderRow.style.display = 'none';

    if (currentFolderView) {
      const folder = savedFolders.find((f) => f.id === currentFolderView);
      els.listFolderTitle.textContent = folder ? folder.name : '';
    } else {
      els.listFolderTitle.textContent = '';
    }

    els.savedListItems.innerHTML = '';
    let rows = [];
    let itemsList; // flat item list for the current view; doubles as swipe context
    if (!currentFolderView) {
      itemsList = savedItems.filter((it) => !it.folderId);
      rows = rows.concat(savedFolders.map((f) => ({ type: 'folder', data: f })));
      rows = rows.concat(itemsList.map((it) => ({ type: 'item', data: it })));
    } else {
      itemsList = savedItems.filter((it) => it.folderId === currentFolderView);
      rows = itemsList.map((it) => ({ type: 'item', data: it }));
    }

    // "一覧" (feed) only makes sense inside a folder that actually has items.
    els.feedBtn.style.display = (currentFolderView && rows.length) ? '' : 'none';

    // Bookshelf grid only applies inside a folder; the top level (folder
    // list + any unfiled items) stays a plain text list.
    const bookshelfMode = !!currentFolderView;
    els.savedListItems.classList.toggle('bookshelf', bookshelfMode);

    if (rows.length === 0) {
      els.savedListEmpty.style.display = 'block';
      els.savedListEmpty.textContent = currentFolderView ? 'このフォルダにはまだ何もありません' : '保存されたURLはまだありません';
    } else {
      els.savedListEmpty.style.display = 'none';
      if (bookshelfMode) {
        itemsList.forEach((it) => els.savedListItems.appendChild(buildBookCard(it, itemsList)));
      } else {
        rows.forEach((r) => {
          els.savedListItems.appendChild(r.type === 'folder' ? buildFolderRow(r.data) : buildItemRow(r.data, itemsList));
        });
      }
    }
  }

  function openSavedList() { currentFolderView = null; renderSavedList(); els.savedListOverlay.classList.add('show'); }
  function closeSavedList() { els.savedListOverlay.classList.remove('show'); }
  function isSavedListOpen() { return els.savedListOverlay.classList.contains('show'); }

  // A saved item only stores the manga's base URL, not which file extension
  // its pages use, so the cover image is found the same cascading way page
  // detection works: try .jpg, then .jpeg/.png/.webp on error, in order.
  // Used by the bookshelf grid (buildBookCard) for cover thumbnails.
  function setupFeedImage(imgEl, baseUrlForItem) {
    let idx = 0;
    function tryNext() {
      if (idx >= EXT_CANDIDATES.length) return;
      imgEl.src = baseUrlForItem + '1.' + EXT_CANDIDATES[idx];
      idx++;
    }
    imgEl.addEventListener('error', tryNext);
    tryNext();
  }

  function anyModalOpen() { return isSaveDialogOpen() || isSavedListOpen() || isCustomAddDialogOpen(); }

  // ---------- events ----------
  function handleNewManga() {
    const input = window.prompt('URLを入力してください\n例: https://example.com/manga/test/  または .../1.jpg');
    if (input === null) return; // cancelled
    const v = input.trim();
    if (!v) return;
    clearReadingListContext();
    startReading(v, true);
  }
  els.newBtn.addEventListener('click', handleNewManga);

  els.saveBtn.addEventListener('click', openSaveDialog);
  els.cancelSaveBtn.addEventListener('click', closeSaveDialog);
  els.confirmSaveBtn.addEventListener('click', confirmSave);
  els.saveDialogOverlay.addEventListener('click', (e) => { if (e.target === els.saveDialogOverlay) closeSaveDialog(); });
  els.saveFolderSelect.addEventListener('change', () => {
    if (els.saveFolderSelect.value === '__new__') {
      els.newFolderRow.style.display = 'flex';
      els.newFolderInput.focus();
    } else {
      els.newFolderRow.style.display = 'none';
    }
  });
  els.confirmNewFolderBtn.addEventListener('click', () => {
    const name = els.newFolderInput.value.trim();
    if (!name) return;
    const folder = { id: genId('f'), name: name };
    savedFolders.push(folder);
    persistAll();
    renderFolderOptions(els.saveFolderSelect, folder.id);
    els.newFolderRow.style.display = 'none';
  });

  els.exportBtn.addEventListener('click', exportData);
  els.importBtn.addEventListener('click', () => els.importFileInput.click());
  els.importFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importDataFromFile(file);
    els.importFileInput.value = '';
  });

  els.addCustomBtn.addEventListener('click', openCustomAddDialog);
  els.cancelCustomAddBtn.addEventListener('click', closeCustomAddDialog);
  els.confirmCustomAddBtn.addEventListener('click', confirmCustomAdd);
  els.customAddOverlay.addEventListener('click', (e) => { if (e.target === els.customAddOverlay) closeCustomAddDialog(); });
  els.customFolderSelect.addEventListener('change', () => {
    if (els.customFolderSelect.value === '__new__') {
      els.customNewFolderRow.style.display = 'flex';
      els.customNewFolderInput.focus();
    } else {
      els.customNewFolderRow.style.display = 'none';
    }
  });
  els.customConfirmNewFolderBtn.addEventListener('click', () => {
    const name = els.customNewFolderInput.value.trim();
    if (!name) return;
    const folder = { id: genId('f'), name: name };
    savedFolders.push(folder);
    persistAll();
    renderFolderOptions(els.customFolderSelect, folder.id);
    els.customNewFolderRow.style.display = 'none';
  });

  els.listBtn.addEventListener('click', openSavedList);
  els.closeListBtn.addEventListener('click', closeSavedList);
  els.savedListOverlay.addEventListener('click', (e) => { if (e.target === els.savedListOverlay) closeSavedList(); });
  els.listBackBtn.addEventListener('click', () => { currentFolderView = null; renderSavedList(); });
  els.listNewFolderBtn.addEventListener('click', () => {
    const showing = els.listNewFolderRow.style.display === 'flex';
    els.listNewFolderRow.style.display = showing ? 'none' : 'flex';
    if (!showing) els.listNewFolderInput.focus();
  });
  els.listNewFolderConfirmBtn.addEventListener('click', () => {
    const name = els.listNewFolderInput.value.trim();
    if (!name) return;
    savedFolders.push({ id: genId('f'), name: name });
    persistAll();
    els.listNewFolderInput.value = '';
    els.listNewFolderRow.style.display = 'none';
    renderSavedList();
  });

  // "一覧": jump straight into the reader for the folder's first manga (no
  // intermediate browsing screen), with swipe context set to the whole
  // folder so the reader's vertical swipe can step through the rest.
  els.feedBtn.addEventListener('click', () => {
    if (!currentFolderView) return;
    const items = savedItems.filter((it) => it.folderId === currentFolderView);
    if (!items.length) return;
    closeSavedList();
    setReadingListContext(items, 0);
    openItem(items[0], false);
  });

  els.zoneLeft.addEventListener('click', prevPage);
  els.zoneRight.addEventListener('click', nextPage);
  els.zoneMid.addEventListener('click', toggleBars);
  els.firstBtn.addEventListener('click', goFirst);
  els.lastBtn.addEventListener('click', goLast);
  els.nextBtn.addEventListener('click', nextPage);
  els.prevBtn.addEventListener('click', prevPage);
  els.animBtn.addEventListener('click', toggleAnim);
  els.pageSlider.addEventListener('input', (e) => showPage(parseInt(e.target.value, 10) || 1));

  document.addEventListener('keydown', (e) => {
    if (e.target === els.saveTitleInput ||
        e.target === els.newFolderInput || e.target === els.listNewFolderInput ||
        e.target === els.customTitleInput || e.target === els.customNewFolderInput ||
        e.target === els.customPagesTextarea) {
      if (e.key === 'Escape') { closeSaveDialog(); closeSavedList(); closeCustomAddDialog(); }
      return;
    }
    if (anyModalOpen()) {
      if (e.key === 'Escape') { closeSaveDialog(); closeSavedList(); closeCustomAddDialog(); }
      return;
    }
    switch (e.key) {
      case 'ArrowLeft': prevPage(); break;   // left = back
      case 'ArrowRight': nextPage(); break;  // right = forward
      case 'Home': goFirst(); break;
      case 'End': goLast(); break;
      case 'h': case 'H': toggleBars(); break;
    }
  });

  // ---------- access lock (always required, not remembered between visits) ----------
  const LOCK_CODE = '8122';

  function checkLock() {
    els.lockOverlay.style.display = 'flex';
    els.lockInput.focus();
  }

  function tryUnlock() {
    if (els.lockInput.value.trim() === LOCK_CODE) {
      els.lockOverlay.style.display = 'none';
      els.lockError.textContent = '';
    } else {
      els.lockError.textContent = 'コードが違います';
      els.lockInput.value = '';
      els.lockInput.focus();
    }
  }

  els.lockSubmitBtn.addEventListener('click', tryUnlock);
  els.lockInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  checkLock();

  // No URL bar anymore, so automatically resume the last-viewed manga on
  // load (not counted as a "新規" open, so it isn't re-added to 履歴).
  // LAST_URL_KEY is now a JSON envelope ({kind:'url',value} or
  // {kind:'item',itemId}) so a custom (explicit page list) manga can be
  // resumed too; older saved data was a plain URL string, handled below.
  try {
    const raw = localStorage.getItem(LAST_URL_KEY);
    if (raw) {
      let resumed = false;
      try {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.kind === 'url' && parsed.value) {
          startReading(parsed.value, false);
          resumed = true;
        } else if (parsed && parsed.kind === 'item' && parsed.itemId) {
          const it = savedItems.find((x) => x.id === parsed.itemId);
          if (it) { openItem(it, false); resumed = true; }
        }
      } catch (e) { /* not JSON: legacy plain-string URL from before this change */ }
      if (!resumed && /^https?:\/\//i.test(raw)) startReading(raw, false);
    }
  } catch (e) {}
})();
</script>
</body>
</html>
