
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連番画像 漫画リーダー</title>
<!-- Home screen (Add to Home Screen) icon and label for iOS Safari -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<meta name="apple-mobile-web-app-title" content="Books">
<style>
  :root {
    --bg: #0a0c11;
    --bg-soft: #0f1218;
    --panel: #161a23;
    --panel-2: #1d2230;
    --border: #262b38;
    --accent: #ff6b4a;
    --accent-2: #46d9c2;
    --accent-dim: rgba(255,107,74,0.16);
    --text: #f1f2f6;
    --sub: #8d93a3;
    --radius: 10px;
    --radius-sm: 7px;
    --shadow-sm: 0 2px 10px rgba(0,0,0,0.4);
    --shadow-md: 0 10px 30px rgba(0,0,0,0.55);
    --ease: cubic-bezier(.22,.85,.32,1);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #app {
    position: relative; height: 100vh; overflow: hidden;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #161a26 0%, var(--bg) 55%);
  }
  ::selection { background: var(--accent-dim); color: var(--text); }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Custom scrollbars for the dark theme (WebKit) */
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2c313f; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4051; }

  /* Thin reading-progress line across the very top edge — width tracks
     currentPage / pages.length. Sits above #topbar (so it stays visible even
     when the bars are toggled hidden) and is unaffected by toggleBars(). */
  #readProgressBar {
    position: absolute; top: 0; left: 0; height: 3px; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    z-index: 12; transition: width 0.25s var(--ease);
    box-shadow: 0 0 8px rgba(255,107,74,0.55);
  }

  /* Top bar (overlays the viewer; hiding it does not change viewer's size) */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; row-gap: 6px;
    padding: 11px 14px; background: rgba(14,16,22,0.68);
    backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%);
    border-bottom: 1px solid var(--border);
    transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
    z-index: 10;
  }
  #topbar.hidden { transform: translateY(-100%); opacity: 0; }
  .ctrlBtn, .primaryBtn {
    padding: 8px 15px; border-radius: var(--radius-sm); border: 1px solid transparent;
    font-size: 13.5px; font-weight: 500; cursor: pointer; white-space: nowrap;
    transition: filter 0.15s ease, transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .primaryBtn {
    background: linear-gradient(135deg, var(--accent), #ff8a5c); color: #1a0c08;
    box-shadow: 0 2px 10px rgba(255,107,74,0.35); font-weight: 600;
  }
  .ctrlBtn { background: var(--panel-2); color: var(--text); border-color: var(--border); }
  .ctrlBtn.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(255,107,74,0.4); }
  /* リーダー上部のお気に入りトグル。アイコン画像1つだけを中央表示する。 */
  .favToggleBtn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 12px; }
  .favToggleBtn img { width: 17px; height: 17px; }
  .ctrlBtn:hover, .primaryBtn:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .ctrlBtn:active, .primaryBtn:active { transform: translateY(0); filter: brightness(0.97); }
  .ctrlBtn:disabled, .primaryBtn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }
  #status { font-size: 12px; color: var(--sub); min-width: 90px; letter-spacing: 0.01em; }
  #currentTitle {
    font-size: 13px; font-weight: 600; color: var(--text);
    max-width: 40vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Viewer: always fills the full app area. Topbar/controls float on top of
     it, so hiding them reveals more of the image instead of leaving blank
     space behind. */
  #viewer {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: #000; overflow: auto;
  }
  /* touch-action:none stops the browser from also starting its own native
     scroll/bounce/zoom on this element. Without it, on the first few px of a
     touchmove (before our drag controller has locked an axis and started
     calling preventDefault) iOS Safari can begin its own elastic scroll, and
     that fights visibly with our live drag for the rest of the gesture. */
  #imgWrap { position: relative; width: 100%; height: 100%; touch-action: none; }
  #pageStage { position: absolute; inset: 0; overflow: hidden; }
  .pageSlide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    will-change: transform;
  }
  .pageimg { display: block; }

  .clickzone { position: absolute; top: 0; bottom: 0; cursor: pointer; }
  .clickzone.left { left: 0; width: 38%; }
  .clickzone.right { right: 0; width: 38%; }
  .clickzone.mid { left: 38%; width: 24%; cursor: default; }

  #placeholder {
    color: var(--sub); font-size: 15px; text-align: center; padding: 20px;
    line-height: 1.8;
  }
  #placeholder code { background: var(--panel-2); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; }

  #spinner {
    display: none; width: 38px; height: 38px;
    border: 3px solid #262b38; border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Bottom controls (also overlays the viewer; see #topbar comment above) */
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; row-gap: 6px;
    padding: 10px 14px; background: rgba(14,16,22,0.68);
    backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%);
    border-top: 1px solid var(--border);
    transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
    z-index: 10;
  }
  #controls.hidden { transform: translateY(100%); opacity: 0; }
  #pageSlider { flex: 1; min-width: 80px; }
  #pageLabel { font-size: 13px; color: var(--sub); min-width: 70px; text-align: center; white-space: nowrap; }

  /* Custom range-slider styling so the page scrubber matches the theme
     instead of the browser's default grey track/thumb. */
  input[type="range"] {
    -webkit-appearance: none; appearance: none; height: 4px; border-radius: 3px;
    background: var(--panel-2); outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); border: 2px solid #1a0c08;
    box-shadow: 0 0 0 3px var(--accent-dim);
    transition: transform 0.15s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.12); }
  input[type="range"]::-moz-range-track { background: var(--panel-2); height: 4px; border-radius: 3px; }
  input[type="range"]::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
    border: 2px solid #1a0c08; box-shadow: 0 0 0 3px var(--accent-dim);
  }

  /* "次の巻" banner: appears over the viewer, above #controls, once the
     reader reaches the true last page of a series-tagged manga and a saved
     item exists for series volume+1. */
  #nextVolumeBanner {
    position: absolute; left: 50%; bottom: 84px; transform: translateX(-50%);
    display: none; align-items: center; gap: 10px;
    background: rgba(18,21,29,0.94); border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: var(--radius); padding: 11px 16px; z-index: 15; max-width: 90vw;
    box-shadow: var(--shadow-md);
    animation: bannerRise 0.25s var(--ease);
  }
  @keyframes bannerRise { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  #nextVolumeBanner.show { display: flex; }
  #nextVolumeText {
    font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* Modal overlays (shared) */
  .modalOverlay {
    position: fixed; inset: 0; background: rgba(6,7,10,0.7);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center; z-index: 50;
    animation: overlayFade 0.18s ease;
  }
  @keyframes overlayFade { from { opacity: 0; } to { opacity: 1; } }
  .modalOverlay.show { display: flex; }
  .modalPanel {
    background: var(--panel); border-radius: 14px; width: min(520px, 90vw);
    max-height: 80vh; display: flex; flex-direction: column; padding: 18px;
    border: 1px solid var(--border); box-shadow: var(--shadow-md);
    animation: panelRise 0.22s var(--ease);
  }
  @keyframes panelRise { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-size: 15px; font-weight: 600;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }

  /* Save dialog */
  .field-label { font-size: 12px; color: var(--sub); display: block; margin-top: 10px; letter-spacing: 0.01em; }
  #saveDialogPanel input[type="text"], #saveDialogPanel select,
  #customAddPanel input[type="text"], #customAddPanel select,
  #editItemPanel input[type="text"], #editItemPanel select,
  #githubSyncPanel input[type="text"], #githubSyncPanel input[type="password"], #githubSyncPanel select {
    width: 100%; padding: 9px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg-soft); color: var(--text); font-size: 16px; margin-top: 4px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  #saveDialogPanel input[type="text"]:focus, #saveDialogPanel select:focus,
  #customAddPanel input[type="text"]:focus, #customAddPanel select:focus,
  #editItemPanel input[type="text"]:focus, #editItemPanel select:focus,
  #githubSyncPanel input[type="text"]:focus, #githubSyncPanel input[type="password"]:focus, #githubSyncPanel select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); outline: none;
  }
  #customAddPanel textarea, #editItemPanel textarea {
    width: 100%; padding: 9px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg-soft); color: var(--text); font-size: 14px; margin-top: 4px;
    font-family: inherit; resize: vertical;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  #customAddPanel textarea:focus, #editItemPanel textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); outline: none;
  }
  #newFolderRow, #customNewFolderRow, #editNewFolderRow { display: none; gap: 8px; margin-top: 8px; }
  #newFolderRow input, #customNewFolderRow input, #editNewFolderRow input { flex: 1; }
  #editUrlRow, #editPagesRow { display: none; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  /* Saved list */
  #listToolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  #listFolderTitle { flex: 1; font-size: 14px; font-weight: 700; }
  #listNewFolderRow { display: none; gap: 8px; margin-bottom: 10px; }
  #listNewFolderRow input {
    flex: 1; padding: 9px 11px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg-soft); color: var(--text); font-size: 16px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  #listNewFolderRow input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); outline: none; }
  #savedListItems { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .saved-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .saved-item:hover { border-color: #353c4c; background: var(--panel-2); }
  .saved-item .url-text, .saved-item .item-text {
    flex: 1; overflow: hidden; cursor: pointer; min-width: 0;
  }
  .folder-name { font-size: 14px; font-weight: 700; }
  .saved-item .item-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved-item .item-url { font-size: 11px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved-item .url-text:hover, .saved-item .item-text:hover .item-title { color: var(--accent); }
  .chevron { color: var(--sub); font-size: 16px; }
  .saved-item button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 5px;
    padding: 4px 9px; cursor: pointer; font-size: 12px; white-space: nowrap; flex-shrink: 0;
    transition: filter 0.15s ease;
  }
  .saved-item button:hover { filter: brightness(1.2); }
  #savedListEmpty { color: var(--sub); font-size: 13px; text-align: center; padding: 24px 0; }

  /* Table of contents (目次) list */
  #tocListItems { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .toc-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 11px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .toc-item:hover { border-color: #353c4c; background: var(--panel-2); }
  .toc-item .toc-text { flex: 1; overflow: hidden; cursor: pointer; min-width: 0; }
  .toc-item .toc-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .toc-item .toc-page { font-size: 11px; color: var(--sub); }
  .toc-item .toc-text:hover .toc-name { color: var(--accent); }
  .toc-item button {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 5px;
    padding: 4px 9px; cursor: pointer; font-size: 12px; white-space: nowrap; flex-shrink: 0;
    transition: filter 0.15s ease;
  }
  .toc-item button:hover { filter: brightness(1.2); }
  #tocListEmpty { color: var(--sub); font-size: 13px; text-align: center; padding: 24px 0; }

  /* Bookshelf grid: shown inside a folder, like a Kindle library — page-1
     cover thumbnails lined up instead of plain text rows. */
  #savedListItems.bookshelf {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(98px, 1fr));
    gap: 18px 12px; align-items: start;
  }
  .book-card {
    cursor: pointer; display: flex; flex-direction: column; gap: 6px;
    animation: bookFadeIn 0.25s var(--ease) both;
  }
  @keyframes bookFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .book-card.reorder-card { cursor: default; }
  .book-cover {
    position: relative; width: 100%; aspect-ratio: 2 / 3; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 9px; overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: transform 0.18s var(--ease), box-shadow 0.18s var(--ease), border-color 0.18s var(--ease);
  }
  .book-card:not(.reorder-card):hover .book-cover {
    transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #3a4156;
  }
  .book-card:not(.reorder-card):active .book-cover { transform: scale(0.96) translateY(0); }
  .book-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .book-title {
    font-size: 11.5px; color: var(--text); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .book-series {
    font-size: 10px; color: var(--accent-2); text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    background: rgba(70,217,194,0.14); border-radius: 8px; padding: 1px 7px;
    align-self: center; max-width: 100%;
  }
  .book-delBtn {
    position: absolute; top: 4px; right: 4px; width: 21px; height: 21px; line-height: 19px;
    text-align: center; border-radius: 50%; background: rgba(10,12,17,0.78); color: var(--text);
    border: 1px solid rgba(255,255,255,0.08); font-size: 13px; cursor: pointer; padding: 0;
    backdrop-filter: blur(3px); transition: filter 0.15s ease;
  }
  .book-delBtn:hover { filter: brightness(1.3); }
  .book-editBtn {
    position: absolute; top: 4px; left: 4px; width: 21px; height: 21px; line-height: 19px;
    text-align: center; border-radius: 50%; background: rgba(10,12,17,0.78); color: var(--text);
    border: 1px solid rgba(255,255,255,0.08); font-size: 12px; cursor: pointer; padding: 0;
    backdrop-filter: blur(3px); transition: filter 0.15s ease;
  }
  .book-editBtn:hover { filter: brightness(1.3); }
  .book-favBtn {
    position: absolute; bottom: 4px; right: 4px; width: 23px; height: 23px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(10,12,17,0.78); color: var(--text);
    border: 1px solid rgba(255,255,255,0.08); cursor: pointer; padding: 0;
    backdrop-filter: blur(3px); transition: filter 0.15s ease, transform 0.15s ease;
  }
  .book-favBtn:hover { filter: brightness(1.3); transform: scale(1.08); }
  .book-favBtn img { width: 13px; height: 13px; }
  /* 並べ替えモード時、編集/削除/お気に入りボタンの代わりに表示する上下移動ボタン */
  .book-moveBtn {
    position: absolute; top: 4px; width: 27px; height: 23px; line-height: 21px;
    text-align: center; border-radius: 6px; background: rgba(10,12,17,0.85); color: var(--text);
    border: 1px solid rgba(255,255,255,0.08); font-size: 12px; cursor: pointer; padding: 0;
    transition: filter 0.15s ease;
  }
  .book-moveBtn:hover { filter: brightness(1.3); }
  .book-moveUpBtn { left: 4px; }
  .book-moveDownBtn { right: 4px; }
  .book-moveBtn:disabled { opacity: 0.3; cursor: not-allowed; }
  /* Folder card: same Kindle-shelf card shape as a book, but shows a folder
     glyph instead of a page-1 cover thumbnail (used at every level now, not
     just inside a folder). */
  .folder-cover {
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, var(--panel-2), var(--bg-soft));
  }
  .folder-cover img { width: 40%; height: auto; opacity: 0.85; }

  /* Export/import */
  #exportImportRow {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 0; margin-bottom: 8px; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }


  /* Access lock */
  #lockOverlay {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 120% 80% at 50% -10%, #161a26 0%, var(--bg) 55%);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  #lockPanel {
    background: var(--panel); border-radius: 16px; padding: 30px 28px;
    width: min(300px, 86vw); text-align: center;
    border: 1px solid var(--border); box-shadow: var(--shadow-md);
    animation: panelRise 0.25s var(--ease);
  }
  #lockPanel p { margin: 0 0 16px; font-size: 14px; color: var(--text); font-weight: 500; }
  #lockInput {
    width: 100%; padding: 11px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg-soft); color: var(--text); font-size: 18px; text-align: center;
    letter-spacing: 6px; margin-bottom: 12px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  #lockInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); outline: none; }
  #lockError { color: var(--accent); font-size: 12px; min-height: 16px; margin-bottom: 8px; }
  #lockSubmitBtn { width: 100%; }
</style>
</head>
<body>
<div id="lockOverlay">
  <div id="lockPanel">
    <p>パスコードを入力してください</p>
    <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off">
    <div id="lockError"></div>
    <button class="primaryBtn" id="lockSubmitBtn">進む</button>
  </div>
</div>
<div id="app">
  <div id="readProgressBar"></div>
  <div id="topbar">
    <button class="primaryBtn" id="newBtn">新規</button>
    <button class="ctrlBtn favToggleBtn" id="closeBtn" title="閉じる" style="display:none;"></button>
    <button class="ctrlBtn" id="saveBtn" title="今のURLを保存">URLを保存</button>
    <button class="ctrlBtn favToggleBtn" id="favToggleBtn" title="お気に入りに追加" style="display:none;"></button>
    <button class="ctrlBtn" id="listBtn" title="保存したURLの一覧">リスト</button>
    <span id="status"></span>
    <span id="currentTitle"></span>
  </div>

  <div id="viewer" class="fit-contain">
    <div id="placeholder" style="display:none;"></div>
    <div id="spinner"></div>
    <div id="imgWrap" style="display:none;">
      <div id="pageStage"></div>
      <div class="clickzone left" id="zoneLeft" title="前のページ"></div>
      <div class="clickzone mid" id="zoneMid" title="表示/操作バーの切替"></div>
      <div class="clickzone right" id="zoneRight" title="次のページ"></div>
    </div>
  </div>

  <div id="controls" style="display:none;">
    <button class="ctrlBtn" id="firstBtn" title="最初のページ">|◀</button>
    <button class="ctrlBtn" id="prevBtn" title="前のページ (←)">◀</button>
    <input type="range" id="pageSlider" min="1" max="1" value="1">
    <span id="pageLabel">1 / 1</span>
    <button class="ctrlBtn" id="nextBtn" title="次のページ (→)">▶</button>
    <button class="ctrlBtn" id="lastBtn" title="最後のページ">▶|</button>
